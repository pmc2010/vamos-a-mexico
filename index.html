  { id:74, group:'mastery', emoji:'📖', title:'Escrituras I', subtitle:'Scripture & Devotion',
    desc:'Key Bible verses to know by heart for sharing the gospel.',
    tip:{es:'Tu palabra es lámpara a mis pies.',en:'Your word is a lamp to my feet.'},
    questions:[
      {type:'passage',label:'What does this verse mean?',prompt:'Porque de tal manera amó Dios al mundo, que dio a su Hijo unigénito, para que todo aquel que en él cree no se pierda, sino que tenga vida eterna. — Juan 3:16',correct:'God loved the world so much that he gave his Son — whoever believes in him has eternal life.',choices:['God loved the world so much that he gave his Son — whoever believes in him has eternal life.','God loves those who are good and gives them eternal blessings.','God sent Jesus to teach the world how to live rightly.','Whoever follows God\'s rules will not die.']},
      {type:'passage',label:'What does this verse mean?',prompt:'El Señor es mi pastor; nada me faltará. — Salmo 23:1',correct:'The Lord is my shepherd; I will not lack anything.',choices:['The Lord is my shepherd; I will not lack anything.','The Lord watches over me every day with his angels.','God is my father and he provides everything I need.','Following God means living without worry.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Todo lo puedo en Cristo que me fortalece. — Filipenses 4:13',correct:'I can do all things through Christ who gives me strength.',choices:['I can do all things through Christ who gives me strength.','Everything is possible if you try hard enough with God\'s help.','Christ makes me stronger than everyone else.','Through faith, God gives me physical strength.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Porque yo sé los planes que tengo para vosotros, dice el Señor, planes de bienestar y no de calamidad, para daros un futuro y una esperanza. — Jeremías 29:11',correct:'God says he has plans for us — good plans, not harm — to give us a future and a hope.',choices:['God says he has plans for us — good plans, not harm — to give us a future and a hope.','God knows the future and tells us everything will be fine eventually.','The Lord plans for his people to be wealthy and successful.','God will punish those who disobey but reward those who follow him.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Amarás al Señor tu Dios con todo tu corazón, y con toda tu alma, y con toda tu mente. Y amarás a tu prójimo como a ti mismo. — Mateo 22:37-39',correct:'Love God with everything you have, and love your neighbor as yourself — the greatest commandments.',choices:['Love God with everything you have, and love your neighbor as yourself — the greatest commandments.','Worship God with music and serve others as much as possible.','The most important thing is to pray and read the Bible every day.','God wants us to love ourselves first, then others.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Venid a mí todos los que estáis trabajados y cargados, y yo os haré descansar. — Mateo 11:28',correct:'Jesus invites the weary and burdened to come to him and find rest.',choices:['Jesus invites the weary and burdened to come to him and find rest.','God rewards those who work hard and carry their burdens faithfully.','Jesus will take away all physical tiredness from those who pray.','Come to church if you are tired and the pastor will help you.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Porque por gracia sois salvos por medio de la fe; y esto no de vosotros, pues es don de Dios. — Efesios 2:8',correct:'Salvation is by grace through faith — it is a gift from God, not something we earn.',choices:['Salvation is by grace through faith — it is a gift from God, not something we earn.','God saves those who are graceful and have strong faith in their actions.','We are saved because God sees our good works and rewards us.','Faith is something God gives to those who pray every day.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Pedid, y se os dará; buscad, y hallaréis; llamad, y se os abrirá. — Mateo 7:7',correct:'Ask and it will be given; seek and you will find; knock and the door will be opened.',choices:['Ask and it will be given; seek and you will find; knock and the door will be opened.','God helps those who help themselves — you must work for what you want.','Prayer is the key to getting everything you need from God.','Keep asking until God answers.']},
      {type:'passage',label:'What does this verse mean?',prompt:'La paz os dejo, mi paz os doy; no os la doy como el mundo la da. No se turbe vuestro corazón, ni tenga miedo. — Juan 14:27',correct:'Jesus gives his peace — not as the world gives. Do not be troubled or afraid.',choices:['Jesus gives his peace — not as the world gives. Do not be troubled or afraid.','The world gives peace through money and security, but God gives real peace.','Jesus commands his followers to stay calm in all situations.','God\'s peace means nothing bad will happen to you.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Dios es amor; y el que permanece en amor, permanece en Dios, y Dios en él. — 1 Juan 4:16',correct:'God is love, and whoever lives in love lives in God, and God in them.',choices:['God is love, and whoever lives in love lives in God, and God in them.','Love is a feeling that God puts in our hearts when we pray.','Those who love God will be loved by others in return.','God rewards with love those who are faithful in their service.']},
    ]},
  { id:75, group:'mastery', emoji:'🗣️', title:'Situaciones Reales', subtitle:'Real Situations',
    desc:'Unexpected, real-world situations — what do you do?',
    tip:{es:'El amor improvisa. La gracia siempre encuentra el camino.',en:'Love improvises. Grace always finds the way.'},
    questions:[
      {type:'passage',label:'A local asks: "¿Por qué vinieron hasta aquí?"',prompt:'Choose the most authentic answer.',correct:'Vinimos porque Dios nos puso en el corazón este lugar y esta gente. Los amamos.',choices:['Vinimos porque Dios nos puso en el corazón este lugar y esta gente. Los amamos.','Vinimos porque nuestros padres nos trajeron.','Es un viaje misionero. Así es.','Siempre quisimos visitar México.']},
      {type:'passage',label:'A teenager says "No creo en Dios."',prompt:'Choose the most respectful and honest response.',correct:'Gracias por decirme eso. ¿Puedo contarte por qué yo sí creo? Tú decides.',choices:['Gracias por decirme eso. ¿Puedo contarte por qué yo sí creo? Tú decides.','Tienes que creer. Sin Dios no hay esperanza.','¿Por qué no crees? ¿Qué te pasó?','Algún día vas a entender. Ten paciencia.']},
      {type:'passage',label:'Someone asks how much money you spent to come.',prompt:'Choose the most appropriate response.',correct:'Costó algo, pero fue una inversión que no cambiaría por nada. Estar aquí no tiene precio.',choices:['Costó algo, pero fue una inversión que no cambiaría por nada. Estar aquí no tiene precio.','Costó mucho dinero. Somos ricos.','No sé exactamente. Es privado.','Mi iglesia pagó todo.']},
      {type:'passage',label:'A child asks "¿Me vas a adoptar?"',prompt:'Choose the most loving and honest response.',correct:'Te amo mucho. No puedo adoptarte, pero Dios es tu Padre perfecto y Él siempre estará contigo.',choices:['Te amo mucho. No puedo adoptarte, pero Dios es tu Padre perfecto y Él siempre estará contigo.','No puedo. Lo siento.','Eso es complicado. Habla con el director.','Ojalá pudiera. Pero vivo muy lejos.']},
      {type:'passage',label:'You accidentally break something in someone\'s home.',prompt:'Choose the most appropriate response.',correct:'¡Lo siento muchísimo! Por favor perdóneme. ¿Puedo reponerlo o pagar por ello?',choices:['¡Lo siento muchísimo! Por favor perdóneme. ¿Puedo reponerlo o pagar por ello?','Fue un accidente. No hay mal que por bien no venga.','Lo siento. Soy muy torpe a veces.','No vi que estaba ahí.']},
      {type:'passage',label:'Someone offers you something you\'re allergic to.',prompt:'How do you politely decline?',correct:'Muchas gracias por su generosidad. Desafortunadamente soy alérgico a eso. Pero lo aprecio mucho.',choices:['Muchas gracias por su generosidad. Desafortunadamente soy alérgico a eso. Pero lo aprecio mucho.','No, gracias. No como eso.','No puedo comer eso.','No me gusta. Gracias.']},
      {type:'passage',label:'You get separated from your group. A local wants to help.',prompt:'Choose the clearest way to explain.',correct:'Me separé de mi grupo. Somos voluntarios. ¿Sabe dónde está el orfanato o la iglesia?',choices:['Me separé de mi grupo. Somos voluntarios. ¿Sabe dónde está el orfanato o la iglesia?','No sé dónde estoy. Estoy perdido.','¿Ha visto a un grupo de americanos?','Necesito ayuda. ¿Habla inglés?']},
      {type:'passage',label:'A child who has been smiling all week seems very sad on the last day.',prompt:'Choose the most compassionate approach.',correct:'Te acercas, te sientas y dices: Te veo triste. ¿Puedo acompañarte? No tienes que hablar.',choices:['Te acercas, te sientas y dices: Te veo triste. ¿Puedo acompañarte? No tienes que hablar.','Le preguntas en voz alta delante de todos qué le pasa.','Le dices que sonría porque hoy es un día de fiesta.','Lo dejas solo porque a veces los niños necesitan espacio.']},
      {type:'passage',label:'Someone asks what your church is called.',prompt:'Choose the clearest way to answer (Calvary Chapel Queen Creek).',correct:'Somos de Calvary Chapel de Queen Creek, en Arizona, Estados Unidos.',choices:['Somos de Calvary Chapel de Queen Creek, en Arizona, Estados Unidos.','Somos de una iglesia cristiana en América.','No sé el nombre exacto en español.','Es una iglesia grande con mucha gente.']},
      {type:'passage',label:'It\'s your last night and you want to share what this week meant to you.',prompt:'Choose the most heartfelt expression.',correct:'Esta semana cambió mi vida. Vine a servir y ustedes me enseñaron más de lo que yo les pude dar. Los amo y nunca los olvidaré.',choices:['Esta semana cambió mi vida. Vine a servir y ustedes me enseñaron más de lo que yo les pude dar. Los amo y nunca los olvidaré.','Fue una buena semana. Me alegra haber venido.','Aprendí mucho español esta semana.','Fue difícil pero valió la pena.']},
    ]},
  { id:76, group:'mastery', emoji:'🙏', title:'Oración', subtitle:'Prayer in Spanish',
    desc:'Pray out loud in Spanish — short, simple, from the heart.',
    tip:{es:'Señor, úsame hoy.',en:'Lord, use me today.'},
    questions:[
      {type:'passage',label:'You want to open the day in prayer. Which is most appropriate?',prompt:'Choose the best opening prayer.',correct:'Señor, gracias por este día. Úsanos para ser tus manos y pies. Amén.',choices:['Señor, gracias por este día. Úsanos para ser tus manos y pies. Amén.','Dios, haz que todo salga bien hoy. Amén.','Señor, protégenos de todo peligro hoy. Amén.','Padre, bendice la comida y danos fuerzas. Amén.']},
      {type:'passage',label:'Someone asks you to pray for their sick child.',prompt:'Choose the most complete prayer.',correct:'Padre, toca a este niño con tu mano sanadora. Restaura su salud y dales paz a esta familia. En el nombre de Jesús, amén.',choices:['Padre, toca a este niño con tu mano sanadora. Restaura su salud y dales paz a esta familia. En el nombre de Jesús, amén.','Señor, que el niño se mejore pronto. Amén.','Dios, tú sabes lo que necesita este niño. Amén.','Padre, haz tu voluntad con este niño. Amén.']},
      {type:'fill',label:'How do you say "In the name of Jesus, amen"?',prompt:'En el ___ de Jesús, amén.',correct:'nombre',choices:['nombre','amor','tiempo','camino']},
      {type:'passage',label:'You want to pray a blessing over a family before leaving.',prompt:'Choose the most complete blessing prayer.',correct:'Padre, bendice a esta familia. Provee para sus necesidades, dales salud y llena este hogar de tu paz. Amén.',choices:['Padre, bendice a esta familia. Provee para sus necesidades, dales salud y llena este hogar de tu paz. Amén.','Señor, cuida a esta familia. Amén.','Dios, bendícelos. Amén.','Padre, que les vaya bien. Amén.']},
      {type:'passage',label:'Someone who just accepted Christ wants you to pray with them.',prompt:'Choose the most appropriate salvation prayer.',correct:'Señor Jesús, gracias por morir por mí. Perdona mis pecados. Entra a mi corazón. Eres mi Señor y Salvador. Amén.',choices:['Señor Jesús, gracias por morir por mí. Perdona mis pecados. Entra a mi corazón. Eres mi Señor y Salvador. Amén.','Dios, acepto tu gracia. Sé mi guía. Amén.','Jesús, quiero seguirte. Ayúdame. Amén.','Padre, hoy decido creer en ti. Amén.']},
      {type:'fill',label:'How do you say "Lord, thank you for this day"?',prompt:'Señor, ___ por este día.',correct:'gracias',choices:['gracias','perdón','ayuda','amor']},
      {type:'passage',label:'The group wants to close the day in prayer together.',prompt:'Choose the best closing prayer for the team.',correct:'Padre, gracias por usarnos hoy. Que lo que hicimos hoy lleve fruto eterno. Danos descanso esta noche. Amén.',choices:['Padre, gracias por usarnos hoy. Que lo que hicimos hoy lleve fruto eterno. Danos descanso esta noche. Amén.','Señor, fue un buen día. Gracias. Amén.','Dios, mañana tenemos más trabajo. Danos fuerzas. Amén.','Padre, te pedimos que el día de mañana sea mejor. Amén.']},
      {type:'fill',label:'How do you say "Your will be done"?',prompt:'___ tu voluntad.',correct:'Hágase',choices:['Hágase','Dígase','Véngase','Hablase']},
      {type:'passage',label:'A child wants to pray but doesn\'t know how.',prompt:'Choose the best encouragement.',correct:'Habla con Dios como si hablaras con un amigo. Él te escucha. No tienes que usar palabras perfectas.',choices:['Habla con Dios como si hablaras con un amigo. Él te escucha. No tienes que usar palabras perfectas.','Tienes que aprenderlo bien antes de orar.','Repite lo que yo digo palabra por palabra.','La oración es para los adultos. Tú solo escucha.']},
      {type:'passage',label:'You want to pray for someone who is not a believer but agreed to let you pray.',prompt:'Choose the prayer most appropriate for an unbeliever.',correct:'Dios, tú conoces a esta persona mejor que nadie. Toca su corazón. Muéstrale tu amor. Amén.',choices:['Dios, tú conoces a esta persona mejor que nadie. Toca su corazón. Muéstrale tu amor. Amén.','Señor, convierte a esta persona ahora mismo. Amén.','Padre, que esta persona deje su incredulidad. Amén.','Dios, hazle ver que está equivocado. Amén.']},
    ]},
  { id:77, group:'mastery', emoji:'🌎', title:'Mezcla III', subtitle:'Grand Mixed Review',
    desc:'Every skill combined — vocabulary, grammar, sentences, and conversation.',
    tip:{es:'Todo lo aprendido, puesto en práctica.',en:'Everything learned, put into practice.'},

      {type:'passage',label:'What does this mean?',prompt:'No vine a México con respuestas. Vine con presencia. A veces eso es todo lo que alguien necesita.',correct:'The person came with presence, not answers. Sometimes that\'s all someone needs.',choices:['The person came with presence, not answers. Sometimes that\'s all someone needs.','The person came to Mexico to find answers to life\'s questions.','Having the right answers is the most important thing in ministry.','Being present is good, but words are more important.']},

      {type:'passage',label:'What is the best way to say goodbye to the whole orphanage?',prompt:'Choose the most complete and loving farewell.',correct:'Los amamos. Nunca los olvidaremos. Dios los ama y tiene un plan para cada uno de ustedes. ¡Hasta pronto!',choices:['Los amamos. Nunca los olvidaremos. Dios los ama y tiene un plan para cada uno de ustedes. ¡Hasta pronto!','Adiós a todos. Fue un placer.','Que les vaya bien. Oraremos por ustedes.','¡Hasta luego! Fue una buena semana.']},

  { id:78, group:'mastery', emoji:'💬', title:'Frases Esenciales', subtitle:'Mission Trip Phrase Blitz',
    desc:'Speed round — match essential mission trip phrases to their meanings.',
    tip:{es:'Las palabras correctas en el momento correcto.',en:'The right words at the right moment.'},
    vocab:[
      {es:'¿Puedo sentarme aquí?',en:'Can I sit here?'},
      {es:'¿Cuántos son en su familia?',en:'How many are in your family?'},

  { id:79, group:'mastery', emoji:'❤️', title:'El Evangelio', subtitle:'The Gospel in Spanish',
    desc:'Share the full gospel simply and clearly in Spanish.',
    tip:{es:'Porque tanto amó Dios al mundo...',en:'For God so loved the world...'},
    questions:[
      {type:'passage',label:'Step 1: What does God feel about people?',prompt:'Choose the sentence that best expresses God\'s love.',correct:'Dios te ama con un amor eterno e incondicional.',choices:['Dios te ama con un amor eterno e incondicional.','Dios te creó para que le sirvas.','Dios quiere que seas una buena persona.','Dios te observa para ver si mereces su amor.']},
      {type:'passage',label:'Step 2: What separates us from God?',prompt:'Choose the sentence that best explains sin.',correct:'Pero todos hemos pecado y estamos separados de Dios. Nuestros pecados nos alejan de Él.',choices:['Pero todos hemos pecado y estamos separados de Dios. Nuestros pecados nos alejan de Él.','El problema es que no oramos suficiente.','La gente hace cosas malas porque no conoce a Dios.','Dios se aleja de nosotros cuando no vamos a la iglesia.']},
      {type:'passage',label:'Step 3: What did God do about the problem?',prompt:'Choose the sentence that best expresses the solution.',correct:'Por eso Dios envió a Jesús. Él murió en la cruz para pagar por nuestros pecados y resucitó al tercer día.',choices:['Por eso Dios envió a Jesús. Él murió en la cruz para pagar por nuestros pecados y resucitó al tercer día.','Dios nos perdonó porque vio que intentamos ser buenos.','Jesús vino a enseñarnos cómo vivir correctamente.','Dios decidió ignorar nuestros pecados porque nos ama.']},
      {type:'passage',label:'Step 4: What must a person do to receive salvation?',prompt:'Choose the sentence that best explains the response.',correct:'Si crees en Jesús, te arrepientes de tus pecados y lo recibes en tu corazón, recibirás el perdón y la vida eterna.',choices:['Si crees en Jesús, te arrepientes de tus pecados y lo recibes en tu corazón, recibirás el perdón y la vida eterna.','Si vas a la iglesia y eres bautizado, serás salvo.','Si eres una buena persona y ayudas a los demás, Dios te aceptará.','Si lees la Biblia todos los días, Dios te perdonará.']},
      {type:'fill',label:'How do you say "Jesus died for your sins"?',prompt:'Jesús murió por tus ___.',correct:'pecados',choices:['pecados','problemas','errores','faltas'],explain:'Pecados = sins — the specific theological term used in Spanish Scripture'},
      {type:'fill',label:'How do you say "He rose from the dead"?',prompt:'Él ___ de entre los muertos.',correct:'resucitó',choices:['resucitó','vivió','subió','salió'],explain:'Resucitó = rose again / resurrected. From resucitar'},
      {type:'fill',label:'How do you say "eternal life"?',prompt:'vida ___',correct:'eterna',choices:['eterna','grande','perfecta','larga'],explain:'Vida eterna = eternal life — a key gospel phrase'},
      {type:'passage',label:'Someone asks "¿Qué tengo que hacer para ser salvo?"',prompt:'Choose the most biblically accurate response.',correct:'Cree en el Señor Jesucristo y serás salvo. Arrepiéntete y recíbelo en tu corazón.',choices:['Cree en el Señor Jesucristo y serás salvo. Arrepiéntete y recíbelo en tu corazón.','Tienes que bautizarte y unirte a una iglesia.','Haz buenas obras y Dios te aceptará.','Reza el Padre Nuestro todos los días.']},
      {type:'fill',label:'How do you say "repent of your sins"?',prompt:'___ de tus pecados.',correct:'Arrepiéntete',choices:['Arrepiéntete','Olvídate','Escóndete','Preocúpate'],explain:'Arrepiéntete = repent (command form of arrepentirse)'},
      {type:'passage',label:'Someone says "Quiero recibir a Jesús." What do you do next?',prompt:'Choose the best next step.',correct:'Le guías en una oración de fe y le explicas que ahora es hijo de Dios.',choices:['Le guías en una oración de fe y le explicas que ahora es hijo de Dios.','Le pides que venga a la iglesia el próximo domingo.','Le dices que hable con el pastor.','Le felicitas y le explicas las reglas de la vida cristiana.']},
    ]},
  { id:80, group:'mastery', emoji:'🏆', title:'¡Campeón del Viaje!', subtitle:'Mission Trip Champion',
    desc:'The ultimate challenge — 10 questions covering everything. ¡Tú puedes!',
    tip:{es:'Bien hecho, siervo bueno y fiel.',en:'Well done, good and faithful servant.'},
    questions:[
      {type:'fill',label:'You see a child crying. What do you say first?',prompt:'___ bien? No estás solo.',correct:'¿Estás',choices:['¿Estás','¿Cómo','¿Dónde','¿Quién'],explain:'¿Estás bien? = Are you okay? Opens with compassion'},
      {type:'passage',label:'A man asks why you fixed his bike for free. Best response?',prompt:'Choose the most gospel-centered answer.',correct:'Porque Dios nos ama a todos, y queremos compartir ese amor con usted.',choices:['Porque Dios nos ama a todos, y queremos compartir ese amor con usted.','Porque es nuestra misión como americanos.','Porque tenemos muchos recursos.','Porque nos entrenaron para esto.']},
      {type:'fill',label:'Conjugate: "Yesterday we prayed for 20 families." (orar, preterite, nosotros)',prompt:'Ayer ___ por veinte familias.',correct:'oramos',choices:['oramos','orábamos','oraban','oraremos'],explain:'NOSOTROS preterite of -AR = -AMOS: oramos'},
      {type:'fill',label:'SER or ESTAR? "The children are excited right now."',prompt:'Los niños ___ muy emocionados ahora.',correct:'están',choices:['están','son','somos','estamos'],explain:'Temporary state (right now) → ESTAR: están emocionados'},
      {type:'passage',label:'How do you invite someone to hear the gospel?',prompt:'Choose the most natural, non-aggressive invitation.',correct:'¿Puedo compartir algo contigo que cambió mi vida? Solo toma un momento.',choices:['¿Puedo compartir algo contigo que cambió mi vida? Solo toma un momento.','Necesitas escuchar el evangelio ahora mismo.','¿Sabes que vas a ir al infierno si no crees?','Tengo algo importante que decirte. Es urgente.']},
      {type:'fill',label:'POR or PARA? "This Bible is for you."',prompt:'Esta Biblia es ___ ti.',correct:'para',choices:['para','por','de','con'],explain:'PARA = recipient — the Bible is intended FOR you'},
      {type:'passage',label:'A child gives you a drawing on the last day. What do you say?',prompt:'Choose the most heartfelt response.',correct:'Es el regalo más bonito que he recibido. Lo guardaré para siempre. ¡Dios te bendiga!',choices:['Es el regalo más bonito que he recibido. Lo guardaré para siempre. ¡Dios te bendiga!','¡Gracias! Está muy bonito.','Lo pondré en mi mochila.','¡Eres muy talentoso!']},
      {type:'fill',label:'How do you say "God has a plan for your life"?',prompt:'Dios tiene un ___ para tu vida.',correct:'plan',choices:['plan','trabajo','idea','sueño'],explain:'Plan = plan. Direct from Jeremiah 29:11 in essence'},
      {type:'passage',label:'Someone says "Yo también quiero creer pero no sé cómo."',prompt:'Choose the most helpful and simple response.',correct:'Es más simple de lo que crees. Habla con Dios desde tu corazón. Él te escucha. ¿Puedo guiarte?',choices:['Es más simple de lo que crees. Habla con Dios desde tu corazón. Él te escucha. ¿Puedo guiarte?','Tienes que ir a la iglesia primero.','Lee la Biblia y así aprenderás cómo creer.','La fe viene sola. Solo espera.']},
      {type:'passage',label:'Final question: What was the most important thing on this trip?',prompt:'Choose the answer that best reflects the heart of the mission.',correct:'Amar. No las bicicletas, no el pelo, no la comida — sino el amor que compartimos.',choices:['Amar. No las bicicletas, no el pelo, no la comida — sino el amor que compartimos.','Arreglar bicicletas y dar cortes de pelo gratuitos.','Compartir el evangelio con muchas personas.','Aprender español para comunicarnos mejor.']},
    ]},

  { id:81, group:'mastery', emoji:'👩‍🍳', title:'Las Tías', subtitle:'The Kitchen Ladies',
    desc:'The women who cook and run things — show them deep respect.',
    tip:{es:'Gracias por alimentarnos con tanto amor.',en:'Thank you for feeding us with so much love.'},
    questions:[
      {type:'passage',label:'You walk into the kitchen. How do you greet the women cooking?',prompt:'Choose the most respectful greeting.',correct:'¡Buenos días, señoras! ¿Puedo ayudar en algo? Huele delicioso.',choices:['¡Buenos días, señoras! ¿Puedo ayudar en algo? Huele delicioso.','¡Hola! ¿Qué están haciendo?','¿Cuándo va a estar lista la comida?','¡Qué bonita cocina! ¿Puedo tomar una foto?']},
      {type:'fill',label:'You want to compliment the food. Fill in the blank.',prompt:'¡Está ___ la comida!',correct:'riquísima',choices:['riquísima','lista','rota','pequeña']},
      {type:'passage',label:'One of the women offers to teach you a recipe. What do you say?',prompt:'Choose the most enthusiastic and humble response.',correct:'¡Me encantaría aprender! Usted es una experta. ¿Me enseña?',choices:['¡Me encantaría aprender! Usted es una experta. ¿Me enseña?','Gracias, pero no cocino muy bien.','Tal vez después. Estoy muy ocupado ahora.','Solo si es fácil. No tengo mucho tiempo.']},
      {type:'fill',label:'How do you say "You cook with so much love"?',prompt:'Usted cocina con mucho ___.',correct:'amor',choices:['amor','dinero','tiempo','trabajo']},
      {type:'passage',label:'A woman looks exhausted after cooking for 200 people. What do you say?',prompt:'Choose the most caring response.',correct:'Señora, usted trabajó muchísimo hoy. Que Dios le pague. ¿Puedo ayudarle a limpiar?',choices:['Señora, usted trabajó muchísimo hoy. Que Dios le pague. ¿Puedo ayudarle a limpiar?','¿Está cansada? Descanse un poco.','Fue mucho trabajo. ¿Lo hacen todos los días?','La comida estuvo muy buena. Gracias.']},
      {type:'fill',label:'How do you say "Thank you for everything you do"?',prompt:'Gracias por ___ lo que hace.',correct:'todo',choices:['todo','algo','poco','nada']},
      {type:'passage',label:'You want to pray a blessing over the woman who fed everyone. What do you say?',prompt:'Choose the most heartfelt prayer.',correct:'Señor, bendice a esta mujer que nos alimentó con tanto amor. Recompénsala con tu paz y tu gozo. Amén.',choices:['Señor, bendice a esta mujer que nos alimentó con tanto amor. Recompénsala con tu paz y tu gozo. Amén.','Dios, gracias por la comida. Amén.','Señor, bendice a todos los que cocinaron. Amén.','Padre, que ella descanse bien esta noche. Amén.']},
      {type:'fill',label:'How do you say "This is the best food I have ever eaten"?',prompt:'Es la mejor comida que he ___ en mi vida.',correct:'comido',choices:['comido','visto','hecho','probado']},
      {type:'passage',label:'She gives you a bag of homemade tortillas to take home. What do you say?',prompt:'Choose the most gracious response.',correct:'¡No puedo creerlo! Es muy generosa. Las voy a guardar como un tesoro. ¡Dios la bendiga!',choices:['¡No puedo creerlo! Es muy generosa. Las voy a guardar como un tesoro. ¡Dios la bendiga!','¡Gracias! Las voy a comer en el avión.','¿Son de maíz o de harina?','Muchas gracias. ¿Cuánto le debo?']},
      {type:'passage',label:'On the last day you want to honor the kitchen team publicly. What do you say?',prompt:'Choose the best public acknowledgment.',correct:'Queremos honrar a estas mujeres increíbles que nos alimentaron toda la semana con amor y dedicación. ¡Un aplauso para ellas!',choices:['Queremos honrar a estas mujeres increíbles que nos alimentaron toda la semana con amor y dedicación. ¡Un aplauso para ellas!','Gracias a las cocineras por su trabajo.','Las señoras de la cocina hicieron un buen trabajo esta semana.','¡Aplausos para la comida!']},
    ]},
  { id:82, group:'mastery', emoji:'👦', title:'Los Teens', subtitle:'Connecting with Teenagers',
    desc:'Teenagers need a different approach — earn their respect first.',
    tip:{es:'A veces el silencio compartido dice más que mil palabras.',en:'Sometimes shared silence says more than a thousand words.'},
    questions:[
      {type:'passage',label:'A group of teenage boys are hanging back, not participating. What do you do first?',prompt:'Choose the best first move.',correct:'Te acercas sin presión, te sientas cerca y dices: ¿Les puedo acompañar? No tienen que hacer nada.',choices:['Te acercas sin presión, te sientas cerca y dices: ¿Les puedo acompañar? No tienen que hacer nada.','Les dices que vengan a participar con los niños pequeños.','Les preguntas por qué no quieren participar.','Los ignoras por ahora y trabajas con los niños pequeños.']},
      {type:'fill',label:'You want to ask what kind of music they like.',prompt:'¿Qué tipo de ___ les gusta?',correct:'música',choices:['música','comida','ropa','trabajo']},
      {type:'passage',label:'A teenager says "Los americanos siempre vienen, toman fotos y se van." How do you respond?',prompt:'Choose the most honest and humble response.',correct:'Tienes razón, y lo entiendo. No vine a tomar fotos. Vine porque me importan ustedes. Y quiero escucharte.',choices:['Tienes razón, y lo entiendo. No vine a tomar fotos. Vine porque me importan ustedes. Y quiero escucharte.','No todos somos así. Nosotros somos diferentes.','Vinimos a ayudar. No somos turistas.','Lo siento si otros grupos hicieron eso.']},
      {type:'fill',label:'How do you say "What are your dreams for the future?"',prompt:'¿Cuáles son tus ___ para el futuro?',correct:'sueños',choices:['sueños','problemas','trabajos','miedos']},
      {type:'passage',label:'A teenage girl opens up and says she wants to be a doctor but thinks it\'s impossible.',prompt:'Choose the most encouraging response.',correct:'Con Dios nada es imposible. Y esa determinación que tienes — eso es un regalo. No renuncies a ese sueño.',choices:['Con Dios nada es imposible. Y esa determinación que tienes — eso es un regalo. No renuncies a ese sueño.','Es difícil, pero si estudias mucho tal vez puedes lograrlo.','Hay otras carreras también. No te limites a una sola.','¿Has hablado con tus papás sobre eso?']},
      {type:'fill',label:'How do you say "I believe in you"?',prompt:'___ en ti.',correct:'Creo',choices:['Creo','Estoy','Soy','Voy']},
      {type:'passage',label:'A teenager asks you "¿Tú crees de verdad en Dios, o solo dices que sí?" (Do you really believe in God or do you just say you do?)',prompt:'Choose the most authentic response.',correct:'Sí, de verdad. No siempre fue fácil creer, pero Él se ha mostrado real en mi vida de maneras que no puedo negar.',choices:['Sí, de verdad. No siempre fue fácil creer, pero Él se ha mostrado real en mi vida de maneras que no puedo negar.','Sí, claro. Soy cristiano desde niño.','Por supuesto. ¿Por qué me preguntas eso?','Esa es una buena pregunta. Depende del día.']},
      {type:'fill',label:'How do you say "Your life has value and purpose"?',prompt:'Tu vida tiene valor y ___.',correct:'propósito',choices:['propósito','precio','dinero','trabajo']},
      {type:'passage',label:'A teenage boy says he\'s angry at God because of his situation.',prompt:'Choose the most compassionate and honest response.',correct:'Ese enojo es válido. Dios puede manejarlo. Habla con Él de verdad — no tienes que fingir. Él te escucha.',choices:['Ese enojo es válido. Dios puede manejarlo. Habla con Él de verdad — no tienes que fingir. Él te escucha.','No deberías estar enojado con Dios. Él tiene sus razones.','Entiendo. La vida no es justa a veces.','Muchos santos en la Biblia también se enojaron. Es normal.']},
      {type:'passage',label:'At the end of the conversation a teenager says "Gracias por escucharme. Nadie me escucha así."',prompt:'Choose the most meaningful response.',correct:'Gracias a ti por confiar en mí. Lo que me dijiste hoy lo llevo en el corazón. Y Dios también te escucha — siempre.',choices:['Gracias a ti por confiar en mí. Lo que me dijiste hoy lo llevo en el corazón. Y Dios también te escucha — siempre.','De nada. Para eso estamos.','Me alegra que hayas podido hablar.','Espero que te haya ayudado un poco.']},
    ]},
  { id:83, group:'mastery', emoji:'👴', title:'Los Abuelitos', subtitle:'Honoring the Elderly',
    desc:'The grandparents and elders carry wisdom and deserve deep honor.',
    tip:{es:'El honor a los mayores es honrar a Dios.',en:'Honoring elders is honoring God.'},
    questions:[
      {type:'passage',label:'An elderly man reaches out to shake your hand. How do you greet him?',prompt:'Choose the most respectful greeting.',correct:'Mucho gusto, señor. Es un honor conocerle. ¿Cómo ha estado?',choices:['Mucho gusto, señor. Es un honor conocerle. ¿Cómo ha estado?','¡Hola! ¿Cuántos años tiene?','Hola, abuelo. ¿Cómo está?','¡Buenas! ¿Está disfrutando el evento?']},
      {type:'fill',label:'How do you say "Please sit down, sir"?',prompt:'Por favor, ___, señor.',correct:'siéntese',choices:['siéntese','corra','venga','espere']},
      {type:'passage',label:'An elderly woman begins telling you a long story in Spanish. You only understand part of it. What do you do?',prompt:'Choose the best response.',correct:'La escuchas con toda tu atención, asientes con la cabeza, sonríes y dices: Sí, sí. Cuénteme más.',choices:['La escuchas con toda tu atención, asientes con la cabeza, sonríes y dices: Sí, sí. Cuénteme más.','La interrumpes y dices que no entiendes español.','Le dices que hable más despacio.','Buscas a alguien que pueda traducir antes de escucharla.']},
      {type:'fill',label:'How do you say "You are very wise"?',prompt:'Usted es muy ___.',correct:'sabio',choices:['sabio','viejo','cansado','enfermo']},
      {type:'passage',label:'An elderly man says he has lived through great hardship and asks if God is real.',prompt:'Choose the most honest and compassionate response.',correct:'Señor, no tengo todas las respuestas. Pero sé que Dios estuvo con usted en esos momentos — aunque no lo sintiera. Su vida tiene un valor enorme.',choices:['Señor, no tengo todas las respuestas. Pero sé que Dios estuvo con usted en esos momentos — aunque no lo sintiera. Su vida tiene un valor enorme.','Claro que Dios es real. ¿Por qué lo duda?','Todo tiene una razón. Dios sabe lo que hace.','Eso es muy difícil. Lo siento mucho.']},
      {type:'fill',label:'How do you say "May I pray for you?"',prompt:'¿___ orar por usted?',correct:'Puedo',choices:['Puedo','Quiero','Debo','Tengo']},
      {type:'passage',label:'An elderly woman takes your face in her hands and blesses you in Spanish. What do you do?',prompt:'Choose the most appropriate response.',correct:'La recibes con humildad, inclinas la cabeza y dices: Gracias, señora. Que Dios la bendiga a usted también.',choices:['La recibes con humildad, inclinas la cabeza y dices: Gracias, señora. Que Dios la bendiga a usted también.','Te ríes nerviosamente y das un paso atrás.','Le dices que no es necesario.','Le preguntas qué está diciendo exactamente.']},
      {type:'fill',label:'How do you say "Your prayers mean a lot to us"?',prompt:'Sus oraciones ___ mucho para nosotros.',correct:'significan',choices:['significan','cuestan','valen','ayudan']},
      {type:'passage',label:'An elderly man says he has never left his village in 80 years. What do you say?',prompt:'Choose the most honoring response.',correct:'Qué vida tan rica la que ha vivido aquí. Este lugar es especial porque usted está en él.',choices:['Qué vida tan rica la que ha vivido aquí. Este lugar es especial porque usted está en él.','¿No quería conocer otros lugares?','¡Ochenta años aquí! Eso es mucho tiempo.','¿No tiene familia en otros lugares?']},
      {type:'passage',label:'An elderly woman asks you to promise to come back next year.',prompt:'Choose the most honest response.',correct:'No puedo prometérselo, señora. Pero sí le prometo que la llevaré en mi corazón y en mis oraciones. Y si Dios quiere, volveré.',choices:['No puedo prometérselo, señora. Pero sí le prometo que la llevaré en mi corazón y en mis oraciones. Y si Dios quiere, volveré.','¡Claro que sí! El año que viene estamos aquí.','Lo voy a intentar. Depende de muchas cosas.','Ojalá pueda. No sé si mi iglesia va a volver.']},
    ]},
  { id:84, group:'mastery', emoji:'👮', title:'Momentos Tensos', subtitle:'Difficult People & Situations',
    desc:'Not everyone will be happy to see you — handle it with grace.',
    tip:{es:'La respuesta suave aplaca la ira.',en:'A gentle answer turns away wrath.'},
    questions:[
      {type:'passage',label:'A man approaches and says "¿Qué vienen a hacer aquí los americanos? ¿A salvarnos?" with hostility.',prompt:'Choose the most disarming response.',correct:'Entiendo su desconfianza. No venimos a salvar a nadie — Dios ya lo hizo. Venimos solo a amar y a servir, si nos lo permiten.',choices:['Entiendo su desconfianza. No venimos a salvar a nadie — Dios ya lo hizo. Venimos solo a amar y a servir, si nos lo permiten.','No tiene razón de estar enojado. Solo queremos ayudar.','Lo siento si otros grupos le fallaron antes.','Tenemos derecho de estar aquí. El pastor nos invitó.']},
      {type:'fill',label:'Someone is speaking loudly and aggressively. How do you say "Please, let\'s speak calmly"?',prompt:'Por favor, hablemos con ___.',correct:'calma',choices:['calma','fuerza','rapidez','cuidado']},
      {type:'passage',label:'A neighbor complains that the noise from the event is disturbing his family.',prompt:'Choose the most respectful response.',correct:'Tiene toda la razón y le pedimos disculpas. Vamos a ver qué podemos hacer para bajar el volumen. Gracias por decirnos.',choices:['Tiene toda la razón y le pedimos disculpas. Vamos a ver qué podemos hacer para bajar el volumen. Gracias por decirnos.','El evento termina en dos horas. Por favor, tenga paciencia.','Estamos haciendo un evento para los niños. Por favor comprenda.','Hablaremos con el pastor sobre eso.']},
      {type:'fill',label:'How do you say "I am sorry, it was not our intention"?',prompt:'Lo siento, no fue nuestra ___.',correct:'intención',choices:['intención','culpa','idea','decisión']},
      {type:'passage',label:'Someone accuses your group of only coming for the photos and social media.',prompt:'Choose the most humble and honest response.',correct:'Es una crítica justa y nos hace reflexionar. Hoy guardamos las cámaras. Queremos estar presentes de verdad.',choices:['Es una crítica justa y nos hace reflexionar. Hoy guardamos las cámaras. Queremos estar presentes de verdad.','Eso no es verdad. Vinimos a servir.','Las fotos son para compartir lo que hacemos, no para presumir.','No todos en el grupo son así.']},
      {type:'fill',label:'How do you say "We come with respect"?',prompt:'Venimos con ___.',correct:'respeto',choices:['respeto','dinero','cámaras','regalos']},
      {type:'passage',label:'A drunk man at the entrance is blocking the way and being disruptive.',prompt:'Choose the safest and most dignified response.',correct:'Le hablas con respeto, sin confrontación: Señor, ¿está bien? ¿Puedo ayudarle? Y si hay un riesgo real, avisas al pastor o al liderazgo.',choices:['Le hablas con respeto, sin confrontación: Señor, ¿está bien? ¿Puedo ayudarle? Y si hay un riesgo real, avisas al pastor o al liderazgo.','Le dices que se vaya inmediatamente.','Lo ignoras y esperas que alguien más lo maneje.','Le preguntas en voz alta por qué está así.']},
      {type:'fill',label:'How do you say "Everything is okay here"?',prompt:'Todo está ___ aquí.',correct:'bien',choices:['bien','mal','listo','roto']},
      {type:'passage',label:'Two locals start arguing near the children\'s area. What do you do?',prompt:'Choose the most appropriate response.',correct:'Te mueves suavemente para alejar a los niños del área, y avisas con discreción al liderazgo local para que intervenga.',choices:['Te mueves suavemente para alejar a los niños del área, y avisas con discreción al liderazgo local para que intervenga.','Te metes en la discusión para mediar.','Les dices que paren enfrente de todos.','Ignoras la situación — no es tu problema.']},
      {type:'passage',label:'Someone challenges you: "¿Por qué no se quedan y ayudan todo el año en vez de venir una semana?"',prompt:'Choose the most honest and thoughtful response.',correct:'Es una pregunta que me hago yo también. Lo que puedo dar ahora es esta semana. Y espero que sea el comienzo, no el final.',choices:['Es una pregunta que me hago yo también. Lo que puedo dar ahora es esta semana. Y espero que sea el comienzo, no el final.','Tenemos trabajos y familias en los Estados Unidos.','Una semana de ayuda es mejor que nada.','Eso es lo que nos permite hacer nuestro presupuesto.']},
    ]},
  { id:85, group:'mastery', emoji:'💒', title:'El Pastor y Su Familia', subtitle:'Honoring the Local Leader',
    desc:'The local pastor is your host — honor him and his family well.',
    tip:{es:'El obrero es digno de su salario.',en:'The worker is worthy of his wages.'},
    questions:[

      {type:'passage',label:'The pastor\'s wife has been working all week supporting everything. How do you honor her?',prompt:'Choose the most meaningful acknowledgment.',correct:'Señora, usted ha sido el corazón de todo lo que pasó esta semana. Dios la ve y Él la recompensa.',choices:['Señora, usted ha sido el corazón de todo lo que pasó esta semana. Dios la ve y Él la recompensa.','Gracias por todo su apoyo esta semana.','Usted trabajó mucho. Que descanse pronto.','¿Le gustó cómo salió todo esta semana?']},
      {type:'fill',label:'How do you say "Your church has blessed us greatly"?',prompt:'Su iglesia nos ha ___ mucho.',correct:'bendecido',choices:['bendecido','ayudado','enseñado','recibido']},

      {type:'fill',label:'How do you say "We will continue to pray for your ministry"?',prompt:'Seguiremos orando por su ___.',correct:'ministerio',choices:['ministerio','iglesia','familia','trabajo']},
      {type:'passage',label:'The pastor prays a long blessing over your group before you leave. What do you do?',prompt:'Choose the most reverent response.',correct:'Escuchan en silencio y con la cabeza inclinada, y al terminar dicen juntos: Amén. Gracias, pastor.',choices:['Escuchan en silencio y con la cabeza inclinada, y al terminar dicen juntos: Amén. Gracias, pastor.','Algunos del grupo toman fotos de la oración.','Esperan pacientemente a que termine.','Le interrumpen para traducir a los que no entienden.']},
      {type:'fill',label:'How do you say "You have a beautiful and faithful church"?',prompt:'Tiene una iglesia hermosa y ___.',correct:'fiel',choices:['fiel','grande','nueva','famosa']},
      {type:'passage',label:'You want to leave the pastor with an encouraging word before departing.',prompt:'Choose the most pastoral and meaningful encouragement.',correct:'Pastor, lo que usted hace aquí importa para la eternidad. No se canse de hacer el bien. Dios ve cada sacrificio.',choices:['Pastor, lo que usted hace aquí importa para la eternidad. No se canse de hacer el bien. Dios ve cada sacrificio.','Fue un honor trabajar con usted esta semana.','Su iglesia va a crecer mucho. Lo podemos ver.','Hasta pronto, pastor. Que le vaya bien.']},

  // ── Emergencies & Hard Moments (86–88) ─────────────────────
  { id:86, group:'mastery', emoji:'🚑', title:'Emergencias', subtitle:'Medical & Safety',

    tip:{es:'Mantén la calma. Dios está en control.',en:'Stay calm. God is in control.'},
    questions:[
      {type:'passage',label:'A child falls and is bleeding. What do you say to get help fast?',prompt:'Choose the clearest call for help.',correct:'¡Necesitamos ayuda! Un niño está herido. ¿Hay un médico o enfermera aquí?',choices:['¡Necesitamos ayuda! Un niño está herido. ¿Hay un médico o enfermera aquí?','¡El niño se cayó! ¡Vengan!','Hay una emergencia. ¿Alguien sabe primeros auxilios?','¡Rápido! ¡Un niño necesita ayuda!']},
      {type:'fill',label:'How do you ask "Does it hurt here?"',prompt:'¿Te ___ aquí?',correct:'duele',choices:['duele','pica','molesta','preocupa']},
      {type:'passage',label:'Someone on your team is having an allergic reaction. What do you say to a local?',prompt:'Choose the clearest explanation.',correct:'Mi amigo necesita ir al hospital ahora. Tiene una reacción alérgica. ¿Dónde está el hospital más cercano?',choices:['Mi amigo necesita ir al hospital ahora. Tiene una reacción alérgica. ¿Dónde está el hospital más cercano?','Mi amigo está enfermo. Necesita medicina.','¿Hay un doctor aquí? Mi amigo no se siente bien.','Es una emergencia médica. ¿Puede ayudarnos?']},
      {type:'fill',label:'How do you say "Call an ambulance"?',prompt:'___ una ambulancia.',correct:'Llame',choices:['Llame','Traiga','Busque','Pida']},
      {type:'passage',label:'A child says their stomach hurts badly. What do you do first?',prompt:'Choose the most responsible first response.',correct:'Le preguntas cuánto tiempo lleva así, le dices que vas a avisar a un adulto de confianza, y te mantienes tranquilo para no asustarlo.',choices:['Le preguntas cuánto tiempo lleva así, le dices que vas a avisar a un adulto de confianza, y te mantienes tranquilo para no asustarlo.','Le das agua y le dices que ya se le pasará.','Lo llevas directamente al hospital sin avisar a nadie.','Le preguntas qué comió y decides si es serio.']},
      {type:'fill',label:'How do you say "Don\'t worry, help is coming"?',prompt:'No te preocupes, la ayuda ___ en camino.',correct:'viene',choices:['viene','está','va','llegó']},
      {type:'passage',label:'There is a fire nearby and people need to evacuate. What do you shout?',prompt:'Choose the clearest evacuation instruction.',correct:'¡Salgan todos con calma! ¡Por aquí! ¡No corran — caminen rápido hacia la salida!',choices:['¡Salgan todos con calma! ¡Por aquí! ¡No corran — caminen rápido hacia la salida!','¡Fuego! ¡Corran!','¡Hay que salir! ¡Ahora!','¡Evacuación! ¡Rápido!']},
      {type:'fill',label:'How do you say "Is everyone okay?"',prompt:'¿Están todos ___?',correct:'bien',choices:['bien','aquí','listos','seguros']},
      {type:'passage',label:'Someone is lost and panicking. How do you calm them down?',prompt:'Choose the most calming response.',correct:'Respira. Estás a salvo. Vamos a encontrar a tu familia juntos. ¿Cómo se llama tu mamá?',choices:['Respira. Estás a salvo. Vamos a encontrar a tu familia juntos. ¿Cómo se llama tu mamá?','No te muevas de aquí. Alguien va a venir.','¿Cómo te perdiste? ¿Dónde estabas?','Todo va a estar bien. Espera aquí.']},
      {type:'passage',label:'A teammate is overwhelmed and crying in a corner. What do you do?',prompt:'Choose the most supportive response.',correct:'Te sientas a su lado en silencio, le pones la mano en el hombro y dices: Estoy aquí. No tienes que hablar. Solo respira.',choices:['Te sientas a su lado en silencio, le pones la mano en el hombro y dices: Estoy aquí. No tienes que hablar. Solo respira.','Le preguntas qué le pasó para poder ayudar.','Le dices que todos están mirando y que necesita calmarse.','Le recuerdas que estamos en un viaje misionero y que Dios está en control.']},
    ]},
  { id:87, group:'mastery', emoji:'💔', title:'Dolor Profundo', subtitle:'Deep Pain & Grief',
    desc:'Some moments call for no words at all — and knowing when that is.',
    tip:{es:'Llorar con los que lloran es también una forma de predicar.',en:'Weeping with those who weep is also a form of preaching.'},
    questions:[
      {type:'passage',label:'A mother tells you her child died recently. What do you say?',prompt:'Choose the most compassionate response.',correct:'Lo siento profundamente. No tengo palabras. ¿Puedo simplemente estar aquí con usted?',choices:['Lo siento profundamente. No tengo palabras. ¿Puedo simplemente estar aquí con usted?','Lo siento mucho. Dios tiene propósitos que no entendemos.','¿Cuándo fue? ¿De qué murió?','Dios se llevó a su ángel al cielo. Está mejor allá.']},
      {type:'fill',label:'How do you say "I am so deeply sorry"?',prompt:'Lo siento ___.',correct:'profundamente',choices:['profundamente','mucho','bastante','un poco']},
      {type:'passage',label:'A man shares that he is suicidal and doesn\'t want to live anymore.',prompt:'Choose the most immediate and compassionate response.',correct:'Gracias por decirme eso. Tu vida importa. No estás solo. ¿Puedo quedarme contigo ahora mismo y buscar ayuda juntos?',choices:['Gracias por decirme eso. Tu vida importa. No estás solo. ¿Puedo quedarme contigo ahora mismo y buscar ayuda juntos?','No pienses así. La vida es un regalo de Dios.','¿Por qué te sientes así? ¿Qué pasó?','Debes hablar con el pastor sobre eso.']},
      {type:'fill',label:'How do you say "Your life matters"?',prompt:'Tu vida ___.',correct:'importa',choices:['importa','cuesta','vale','pesa']},
      {type:'passage',label:'A child has just learned their parent is very sick. They are numb and silent.',prompt:'Choose the most appropriate response.',correct:'Te sientas junto a ellos sin hablar. A veces solo estar presente es el mayor regalo que puedes dar.',choices:['Te sientas junto a ellos sin hablar. A veces solo estar presente es el mayor regalo que puedes dar.','Les dices que Dios tiene el control y que todo va a estar bien.','Les preguntas cómo se sienten para que procesen sus emociones.','Los llevas a un lugar más alegre para distraerlos.']},
      {type:'fill',label:'How do you say "You don\'t have to be strong right now"?',prompt:'No tienes que ser ___ ahora.',correct:'fuerte',choices:['fuerte','perfecto','alegre','positivo']},
      {type:'passage',label:'Someone is grieving a relationship loss and says "Nadie me va a amar nunca."',prompt:'Choose the most truthful and gentle response.',correct:'Eso no es verdad. Yo estoy aquí. Y hay alguien que te amó tanto que dio su vida por ti. Eso nunca va a cambiar.',choices:['Eso no es verdad. Yo estoy aquí. Y hay alguien que te amó tanto que dio su vida por ti. Eso nunca va a cambiar.','No digas eso. Eres muy buena persona.','El tiempo lo cura todo. Ya vas a ver.','Tienes que amarte a ti mismo primero.']},
      {type:'fill',label:'How do you say "God sees your pain"?',prompt:'Dios ___ tu dolor.',correct:'ve',choices:['ve','siente','conoce','cura']},
      {type:'passage',label:'A family shares they lost their home in a flood. They have nothing.',prompt:'Choose the most grounded and compassionate response.',correct:'Lo siento muchísimo. Eso es devastador. Estamos aquí para lo que necesiten ahora mismo. ¿Cómo podemos ayudar hoy?',choices:['Lo siento muchísimo. Eso es devastador. Estamos aquí para lo que necesiten ahora mismo. ¿Cómo podemos ayudar hoy?','Dios provee. No se preocupen.','Qué difícil. Dios tiene un plan para ustedes.','Lo material se puede recuperar. Lo importante es que están vivos.']},
      {type:'passage',label:'After a hard conversation full of tears, the person thanks you for listening. What do you say?',prompt:'Choose the most humble response.',correct:'Gracias a usted por confiar en mí. Me llevé algo hoy también. Voy a orar por usted cada día.',choices:['Gracias a usted por confiar en mí. Me llevé algo hoy también. Voy a orar por usted cada día.','De nada. Para eso estamos.','Fue muy conmovedor. Gracias por compartir.','Espero haberle ayudado un poco.']},
    ]},
  { id:88, group:'mastery', emoji:'😰', title:'El Equipo', subtitle:'When Your Team Struggles',
    desc:'Trip tension is real — how you handle it matters as much as the mission.',
    tip:{es:'El amor no busca lo suyo.',en:'Love does not seek its own.'},
    questions:[
      {type:'passage',label:'Two teammates are arguing in front of the kids. What do you do?',prompt:'Choose the most de-escalating response.',correct:'Con calma les dices en privado: Vamos a hablar de esto esta noche. Ahora los niños nos necesitan. ¿Podemos pausar?',choices:['Con calma les dices en privado: Vamos a hablar de esto esta noche. Ahora los niños nos necesitan. ¿Podemos pausar?','Les dices delante de todos que deben calmarse.','Los ignoras y esperas que se les pase.','Avisas al líder del viaje inmediatamente.']},
      {type:'fill',label:'How do you say "Let\'s talk about this later"?',prompt:'Hablemos de esto ___.',correct:'después',choices:['después','ahora','mañana','nunca']},
      {type:'passage',label:'A teammate is complaining constantly about the conditions. What do you say privately?',prompt:'Choose the most honest and kind response.',correct:'Entiendo que es difícil. Pero los locales escuchan y nos observan. ¿Podemos procesar esto esta noche juntos?',choices:['Entiendo que es difícil. Pero los locales escuchan y nos observan. ¿Podemos procesar esto esta noche juntos?','Todos estamos incómodos. Tienes que aguantar.','Si no puedes con esto, quizás no debiste venir.','Habla con el líder. No es mi responsabilidad.']},
      {type:'fill',label:'How do you say "We are a team"?',prompt:'Somos un ___.',correct:'equipo',choices:['equipo','grupo','club','viaje']},
      {type:'passage',label:'Someone on the team is taking too many photos instead of engaging with people.',prompt:'Choose the most gentle correction.',correct:'Oye, ¿puedes guardar el teléfono un momento? Hay un niño que te estuvo mirando toda la tarde. Creo que quiere conectar.',choices:['Oye, ¿puedes guardar el teléfono un momento? Hay un niño que te estuvo mirando toda la tarde. Creo que quiere conectar.','¿Puedes dejar de tomar fotos? No se ve bien.','El líder dijo que no tomáramos tantas fotos.','Las fotos pueden esperar. Mejor interactúa con la gente.']},
      {type:'fill',label:'How do you say "Let\'s focus on the people"?',prompt:'Enfoquémonos en las ___.',correct:'personas',choices:['personas','fotos','tareas','actividades']},
      {type:'passage',label:'A teammate breaks down crying at the end of a hard day and says they feel useless.',prompt:'Choose the most affirming response.',correct:'No eres inútil — eres esencial. Ese niño que abrazaste hoy tal vez no lo olvidará nunca. No todo se mide en tareas.',choices:['No eres inútil — eres esencial. Ese niño que abrazaste hoy tal vez no lo olvidará nunca. No todo se mide en tareas.','Todos tenemos días malos. Mañana será mejor.','¿Qué pasó hoy? Cuéntame.','Es normal sentirse así en un viaje misionero.']},
      {type:'fill',label:'How do you say "God is using you right now"?',prompt:'Dios te está ___ ahora mismo.',correct:'usando',choices:['usando','mirando','probando','formando']},
      {type:'passage',label:'At the nightly debrief, the team is exhausted and silent. How do you open the conversation?',prompt:'Choose the most gentle opener.',correct:'¿Qué fue lo más difícil hoy? Y también — ¿qué fue lo más sagrado?',choices:['¿Qué fue lo más difícil hoy? Y también — ¿qué fue lo más sagrado?','¿Cómo estuvo el día? ¿Hay reportes?','¿Alguien tiene algo que compartir?','Necesito que todos digan una cosa positiva del día.']},
      {type:'passage',label:'The trip leader is clearly exhausted and hasn\'t eaten. What do you do?',prompt:'Choose the most caring response.',correct:'Le traes comida sin decir nada, te sientas a su lado y dices: Tú también importas. ¿Cómo estás tú?',choices:['Le traes comida sin decir nada, te sientas a su lado y dices: Tú también importas. ¿Cómo estás tú?','Le dices que descanse. Nosotros manejamos el resto.','Le preguntas qué necesita del equipo.','Lo dejas solo. Necesita espacio.']},
    ]},

  // ── Culture & Respect (89–91) ───────────────────────────────
  { id:89, group:'mastery', emoji:'🇲🇽', title:'Cultura I', subtitle:'Mexican Culture & Customs',
    desc:'Things to know so you love well and don\'t accidentally offend.',
    tip:{es:'La humildad cultural es la primera forma de amor.',en:'Cultural humility is the first form of love.'},
    questions:[
      {type:'passage',label:'In Mexico, personal space and greetings are different. A woman you\'ve just met greets you with a cheek kiss. What do you do?',prompt:'Choose the most culturally appropriate response.',correct:'Recibes el saludo con una sonrisa y lo correspondes — es una señal de amistad y respeto.',choices:['Recibes el saludo con una sonrisa y lo correspondes — es una señal de amistad y respeto.','Te apartas educadamente — en tu cultura no se hace así.','Le explicas que en los Estados Unidos se dan la mano.','Lo aceptas pero te sientes muy incómodo y lo muestras.']},
      {type:'passage',label:'You\'re invited to a home and the host keeps offering more food even when you\'re full. What is the culturally wise thing to do?',prompt:'Choose the most culturally sensitive response.',correct:'Tomas un poco más la primera vez que ofrecen — rechazar puede sentirse como un insulto. La generosidad es sagrada para ellos.',choices:['Tomas un poco más la primera vez que ofrecen — rechazar puede sentirse como un insulto. La generosidad es sagrada para ellos.','Dices claramente que ya comiste suficiente.','Aceptas todo para no ofender, aunque te sientas mal después.','Explicas que en tu cultura es normal rechazar la comida.']},
      {type:'fill',label:'How do you say "Thank you for your hospitality"?',prompt:'Gracias por su ___.',correct:'hospitalidad',choices:['hospitalidad','comida','casa','familia']},
      {type:'passage',label:'You notice that locals are much more indirect in how they say "no." Someone says "Ahorita" (in a little bit) to your request. What does it likely mean?',prompt:'What does "ahorita" often signal in Mexico?',correct:'It may mean "not right now" or even "no" — directness is less common; patience is key.',choices:['It may mean "not right now" or even "no" — directness is less common; patience is key.','It means exactly "in 5 minutes."','It means "yes, right away."','It is an expression of enthusiasm.']},
      {type:'passage',label:'You want to take photos of the children. What should you do first?',prompt:'Choose the most respectful approach.',correct:'Pide permiso a los adultos responsables antes de tomar cualquier foto. Siempre.',choices:['Pide permiso a los adultos responsables antes de tomar cualquier foto. Siempre.','Toma fotos libremente — es para documentar el viaje.','Solo toma fotos si los niños sonríen.','Pregúntale al niño directamente si puedes tomar la foto.']},
      {type:'fill',label:'How do you say "May I take a photo?"',prompt:'¿___ tomar una foto?',correct:'Puedo',choices:['Puedo','Quiero','Voy a','Me gusta']},
      {type:'passage',label:'A local family invites your whole team to eat at their home — a significant sacrifice for them. How do you respond?',prompt:'Choose the most honoring response.',correct:'Agradeces con todo tu corazón y vas — rechazar una invitación así puede herir profundamente. Ofrecen lo mejor que tienen.',choices:['Agradeces con todo tu corazón y vas — rechazar una invitación así puede herir profundamente. Ofrecen lo mejor que tienen.','Agradeces pero explicas que el equipo tiene compromisos.','Aceptas pero llevas tu propia comida por si acaso.','Agradeces y preguntas cuántos del equipo pueden ir.']},
      {type:'passage',label:'You notice that time is much more flexible in the local culture — meetings start late, events run long. How do you adjust?',prompt:'Choose the most culturally wise response.',correct:'Adoptas el ritmo local con gracia. La relación importa más que el horario. Llegas con expectativas flexibles.',choices:['Adoptas el ritmo local con gracia. La relación importa más que el horario. Llegas con expectativas flexibles.','Estableces horarios claros y pides que se respeten.','Llegas tarde también para adaptarte.','Le explicas al pastor que el tiempo también importa.']},
      {type:'passage',label:'Someone gives you a handmade gift — it looks simple and inexpensive.',prompt:'Choose the most honoring response.',correct:'Lo recibes con las dos manos, lo miras con genuino aprecio y dices: Es hermoso. Lo guardaré siempre.',choices:['Lo recibes con las dos manos, lo miras con genuino aprecio y dices: Es hermoso. Lo guardaré siempre.','¡Gracias! ¿Lo hiciste tú mismo?','Gracias. ¿Cuánto tiempo te tomó hacerlo?','¡Qué bonito! ¿Lo puedo poner aquí por ahora?']},
      {type:'fill',label:'How do you say "I respect your culture very much"?',prompt:'Respeto mucho su ___.',correct:'cultura',choices:['cultura','país','idioma','comida']},
    ]},
  { id:90, group:'mastery', emoji:'🙏', title:'Cultura II', subtitle:'Faith & Church Culture',
    desc:'Mexican church culture has its own beautiful expressions of faith.',
    tip:{es:'En la variedad del cuerpo de Cristo hay riqueza.',en:'In the variety of the body of Christ there is richness.'},
    questions:[
      {type:'passage',label:'The worship service is much louder and more expressive than what you\'re used to. What is the right attitude?',prompt:'Choose the most open and worshipful response.',correct:'Te unes con humildad — el Espíritu Santo se mueve de maneras diferentes. Este es su estilo de adorar y es válido y hermoso.',choices:['Te unes con humildad — el Espíritu Santo se mueve de maneras diferentes. Este es su estilo de adorar y es válido y hermoso.','Participas lo que puedes pero internamente prefieres tu estilo.','Le comentas a un compañero que es muy diferente a tu iglesia.','Intentas adaptarte aunque no te sientes cómodo.']},
      {type:'fill',label:'How do you say "Your way of worshiping is beautiful"?',prompt:'Su manera de adorar es ___.',correct:'hermosa',choices:['hermosa','diferente','especial','interesante']},
      {type:'passage',label:'The pastor prays for a very long time in Spanish. You don\'t understand most of it. What do you do?',prompt:'Choose the most reverent response.',correct:'Cierras los ojos, inclinas la cabeza y oras en tu propio corazón. La oración no necesita traducción.',choices:['Cierras los ojos, inclinas la cabeza y oras en tu propio corazón. La oración no necesita traducción.','Escuchas atentamente para tratar de entender.','Le preguntas al de al lado que te traduzca en voz baja.','Revisas tu teléfono discretamente mientras esperas.']},
      {type:'fill',label:'How do you say "The Holy Spirit is present here"?',prompt:'El Espíritu ___ está presente aquí.',correct:'Santo',choices:['Santo','Grande','Bueno','Fuerte']},
      {type:'passage',label:'During an altar call, someone falls to the floor overcome with emotion. What do you do?',prompt:'Choose the most spiritually sensitive response.',correct:'No interrumpes. Te quedas cerca con respeto, en oración, y dejas que el Espíritu Santo haga su trabajo.',choices:['No interrumpes. Te quedas cerca con respeto, en oración, y dejas que el Espíritu Santo haga su trabajo.','Te acercas para ver si está bien físicamente.','Sacas el teléfono para documentar el momento.','Le preguntas en voz baja si necesita ayuda.']},
      {type:'fill',label:'How do you say "God is moving here"?',prompt:'Dios se está ___ aquí.',correct:'moviendo',choices:['moviendo','quedando','sentando','yendo']},
      {type:'passage',label:'The offering plate comes around. As a guest, what is the appropriate thing to do?',prompt:'Choose the most culturally and spiritually wise response.',correct:'Si sientes que debes dar, da con generosidad. No es obligatorio como visitante — pero participar es honrar al cuerpo local.',choices:['Si sientes que debes dar, da con generosidad. No es obligatorio como visitante — pero participar es honrar al cuerpo local.','Pasas el plato sin dar — eres visitante y ya gastaste en el viaje.','Das lo más que puedes para impresionar a los locales.','Preguntas al pastor qué se espera de los visitantes.']},
      {type:'passage',label:'The service runs 3 hours — much longer than expected. Half the team looks restless.',prompt:'Choose the most appropriate team response.',correct:'Modelas paciencia y gozo genuino. Recuerdas al equipo con los ojos: esto es sagrado para ellos. Honrémoslo.',choices:['Modelas paciencia y gozo genuino. Recuerdas al equipo con los ojos: esto es sagrado para ellos. Honrémoslo.','Le preguntas discretamente al pastor cuánto falta.','Propones que algunos del equipo salgan a descansar.','Les susurras a los demás que ya casi termina.']},
      {type:'fill',label:'How do you say "Thank you for sharing your faith with us"?',prompt:'Gracias por compartir su ___ con nosotros.',correct:'fe',choices:['fe','iglesia','pastor','tiempo']},
