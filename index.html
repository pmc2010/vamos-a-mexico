    ]},
  { id:91, group:'mastery', emoji:'🤝', title:'Ser un Buen Huésped', subtitle:'Being a Good Guest',
    desc:'The little things that show whether you\'re a servant or a tourist.',
    tip:{es:'El que quiera ser grande entre ustedes, que sea su servidor.',en:'Whoever wants to be great among you must be your servant.'},
    questions:[
      {type:'passage',label:'You arrive and immediately start rearranging things in the space to make it "more efficient."',prompt:'Is this a good idea? What should you do instead?',correct:'No — you ask first. "¿Podemos mover algunas cosas? ¿Cómo prefieren que esté organizado?" It\'s their space.',choices:['No — you ask first. "¿Podemos mover algunas cosas? ¿Cómo prefieren que esté organizado?" It\'s their space.','Yes — efficiency helps everyone. You\'re here to serve.','Ask one person quietly and then go ahead.','Wait until the pastor arrives to ask him.']},
      {type:'fill',label:'How do you say "How can we help you?"',prompt:'¿Cómo ___ ayudarle?',correct:'podemos',choices:['podemos','queremos','debemos','vamos']},
      {type:'passage',label:'Your team leaves a mess in the area where you worked. What do you do?',prompt:'Choose the most servant-hearted response.',correct:'Antes de irte, limpias todo — mejor de lo que estaba. Los buenos huéspedes dejan el lugar más ordenado, no más sucio.',choices:['Antes de irte, limpias todo — mejor de lo que estaba. Los buenos huéspedes dejan el lugar más ordenado, no más sucio.','Limpias lo que puedes y dejas el resto para mañana.','Buscas a alguien del equipo para que limpie.','Preguntas si tienen personal de limpieza.']},
      {type:'fill',label:'How do you say "We will leave it better than we found it"?',prompt:'Lo dejaremos ___ de lo que lo encontramos.',correct:'mejor',choices:['mejor','igual','limpio','listo']},
      {type:'passage',label:'You notice the local team is doing all the hard physical work while your group stands around.',prompt:'Choose the most servant-hearted response.',correct:'Te unes inmediatamente al trabajo más pesado y animas al resto del equipo a hacer lo mismo.',choices:['Te unes inmediatamente al trabajo más pesado y animas al resto del equipo a hacer lo mismo.','Ofreces ayuda pero esperas que te digan exactamente qué hacer.','Le dices al líder que el equipo necesita más dirección.','Empiezas a hacer cosas por tu cuenta sin preguntar.']},
      {type:'fill',label:'How do you say "What is the hardest thing I can do for you today?"',prompt:'¿Cuál es la tarea más ___ que puedo hacer por usted hoy?',correct:'difícil',choices:['difícil','importante','rápida','sencilla']},
      {type:'passage',label:'A local family has given up their own beds for your team. How do you respond?',prompt:'Choose the most gracious response.',correct:'Agradeces profundamente y no lo tomas como algo normal. Haces tu cama perfectamente cada mañana y dejas el espacio impecable.',choices:['Agradeces profundamente y no lo tomas como algo normal. Haces tu cama perfectamente cada mañana y dejas el espacio impecable.','Agradeces y usas el espacio con normalidad.','Ofreces pagarles algo por el alojamiento.','Preguntas si hay una opción de hotel cerca.']},
      {type:'passage',label:'Your team finishes the day\'s work early. What do you do with the extra time?',prompt:'Choose the most servant-hearted use of time.',correct:'Preguntas al liderazgo local: ¿Hay algo más que podamos hacer? Siempre hay trabajo que hacer.',choices:['Preguntas al liderazgo local: ¿Hay algo más que podamos hacer? Siempre hay trabajo que hacer.','Descansan — se lo merecen después del trabajo duro.','Exploran la zona — es parte de la experiencia cultural.','Se reúnen como equipo para reflexionar sobre el día.']},
      {type:'fill',label:'How do you say "We are here to serve, not to be served"?',prompt:'Estamos aquí para ___, no para ser servidos.',correct:'servir',choices:['servir','ayudar','trabajar','orar']},
      {type:'passage',label:'On the last day your team wants to have a big celebration dinner — just for yourselves.',prompt:'Choose the most missionally wise response.',correct:'Propones incluir al liderazgo local y a algunas familias — la última cena debe ser compartida, no exclusiva.',choices:['Propones incluir al liderazgo local y a algunas familias — la última cena debe ser compartida, no exclusiva.','Es razonable — el equipo necesita tiempo propio al final.','La celebración es importante para el bienestar del equipo.','Preguntas al pastor si está bien tener la cena solo para el equipo.']},
    ]},

  // ── Scripture Memory (92–95) ────────────────────────────────
  { id:92, group:'mastery', emoji:'📖', title:'Escrituras II', subtitle:'More Scripture',
    desc:'More key verses — these come up in ministry conversations every day.',
    tip:{es:'La Palabra de Dios es viva y poderosa.',en:'The Word of God is living and powerful.'},
    questions:[
      {type:'passage',label:'What does this verse mean?',prompt:'No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento. — Romanos 12:2',correct:'Do not conform to this world but be transformed by the renewing of your mind.',choices:['Do not conform to this world but be transformed by the renewing of your mind.','Do not follow the rules of this age, but create your own path.','Transform the world around you through your actions and words.','Renew your strength by separating yourself from the world.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Encomienda tu camino al Señor; confía en él, y él actuará. — Salmo 37:5',correct:'Commit your way to the Lord; trust in him, and he will act.',choices:['Commit your way to the Lord; trust in him, and he will act.','Follow God\'s path and do whatever he commands you.','Tell God your plans and he will approve the best ones.','Trust in the Lord and he will give you what you want.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Porque somos hechura de Dios, creados en Cristo Jesús para buenas obras. — Efesios 2:10',correct:'We are God\'s workmanship, created in Christ Jesus to do good works.',choices:['We are God\'s workmanship, created in Christ Jesus to do good works.','God made us to worship him through our creative talents.','We were created to be good people and earn God\'s love.','Through Christ Jesus, we can make ourselves better people.']},
      {type:'fill',label:'Complete this verse: "Porque somos hechura de Dios, creados en Cristo Jesús para ___ obras."',prompt:'Fill in the blank.',correct:'buenas',choices:['buenas','grandes','muchas','nuevas'],explain:'Buenas obras = good works. We were created for good works — not just belief but action.'},
      {type:'passage',label:'What does this verse mean?',prompt:'Pero los que esperan en el Señor renovarán sus fuerzas; volarán como las águilas. — Isaías 40:31',correct:'Those who hope in the Lord will renew their strength; they will soar like eagles.',choices:['Those who hope in the Lord will renew their strength; they will soar like eagles.','Those who wait patiently for God will eventually fly to him.','God gives wings to the faithful so they can escape their troubles.','Eagles are the symbol of God\'s strength in the Old Testament.']},
      {type:'passage',label:'What does this verse mean?',prompt:'Jehová es mi luz y mi salvación; ¿a quién temeré? — Salmo 27:1',correct:'The Lord is my light and my salvation — whom shall I fear?',choices:['The Lord is my light and my salvation — whom shall I fear?','God guides me with his light, so I will never be in darkness.','Because of God\'s salvation, I have no reason to be afraid of anything.','The Lord saves those who seek his light and follow his ways.']},
      {type:'fill',label:'Complete this verse: "Jehová es mi luz y mi ___; ¿a quién temeré?"',prompt:'Fill in the blank.',correct:'salvación',choices:['salvación','fuerza','amor','pastor'],explain:'Salvación = salvation. Psalm 27:1 — the Lord is my light AND my salvation.'},
      {type:'passage',label:'What does this verse mean?',prompt:'¿No te lo he mandado? Esfuérzate y sé valiente. No te atemorices ni desmayes, porque el Señor tu Dios estará contigo. — Josué 1:9',correct:'God commands us to be strong and courageous — he will be with us wherever we go.',choices:['God commands us to be strong and courageous — he will be with us wherever we go.','God will fight our battles for us if we are brave enough to ask.','Strength and courage are gifts God gives to those who pray.','Do not be afraid — God\'s angels will protect you wherever you go.']},
      {type:'passage',label:'What does this verse mean?',prompt:'El amor es sufrido, es benigno; el amor no tiene envidia; no es jactancioso, no se envanece. — 1 Corintios 13:4',correct:'Love is patient and kind; it does not envy or boast; it is not proud.',choices:['Love is patient and kind; it does not envy or boast; it is not proud.','Love endures all suffering and is always generous to others.','The greatest love is the one that sacrifices everything for others.','Love is a feeling of deep goodwill that God puts in our hearts.']},
      {type:'fill',label:'Complete: "El amor es sufrido, es ___."',prompt:'Fill in the blank.',correct:'benigno',choices:['benigno','paciente','bueno','dulce'],explain:'Benigno = kind/benign. Love is patient (sufrido) AND kind (benigno) — 1 Corinthians 13:4'},
    ]},
  { id:93, group:'mastery', emoji:'📖', title:'Escrituras III', subtitle:'Gospel Fluency',
    desc:'The verses that come up most when sharing the gospel.',
    tip:{es:'Siempre listos para dar razón de la esperanza que hay en vosotros.',en:'Always ready to give a reason for the hope that is in you.'},
    questions:[
      {type:'fill',label:'Complete Juan 3:16: "Porque de tal manera amó Dios al mundo, que dio a su Hijo ___, para que todo aquel que en él cree no se pierda."',prompt:'Fill in the blank.',correct:'unigénito',choices:['unigénito','único','especial','amado'],explain:'Unigénito = only begotten / one and only Son. John 3:16\'s key word.'},
      {type:'fill',label:'Complete Romanos 3:23: "Por cuanto todos ___ y están destituidos de la gloria de Dios."',prompt:'Fill in the blank.',correct:'pecaron',choices:['pecaron','sufrieron','fallaron','erraron'],explain:'Pecaron = sinned. Romans 3:23 — all have sinned and fall short of God\'s glory.'},
      {type:'fill',label:'Complete Romanos 6:23: "Porque la paga del pecado es muerte, mas la ___ de Dios es vida eterna en Cristo Jesús."',prompt:'Fill in the blank.',correct:'dádiva',choices:['dádiva','gracia','paz','bendición'],explain:'Dádiva = gift. The wages of sin is death, but the GIFT of God is eternal life.'},
      {type:'fill',label:'Complete Romanos 10:9: "Si confesares con tu boca que Jesús es el Señor, y ___ en tu corazón que Dios le levantó de los muertos, serás salvo."',prompt:'Fill in the blank.',correct:'creyeres',choices:['creyeres','dijeres','pidieres','sintieres'],explain:'Creyeres = if you believe. Romans 10:9 — confess AND believe = salvation.'},
      {type:'passage',label:'What is the "bridge" illustration in the gospel?',prompt:'Choose the most accurate summary.',correct:'Sin separates us from God like a chasm. Jesus is the bridge — the cross spans the gap so we can cross to God.',choices:['Sin separates us from God like a chasm. Jesus is the bridge — the cross spans the gap so we can cross to God.','We build the bridge to God through good works and prayer.','God throws a rope to us when we call out to him in desperation.','The church is the bridge between sinful people and a holy God.']},
      {type:'fill',label:'Complete Apocalipsis 3:20: "He aquí, yo estoy a la ___ y llamo; si alguno oye mi voz y abre la puerta, entraré a él."',prompt:'Fill in the blank.',correct:'puerta',choices:['puerta','ventana','entrada','casa'],explain:'Puerta = door. Revelation 3:20 — Jesus stands at the door and knocks.'},
      {type:'passage',label:'Someone asks "¿Qué pasa después de morir si acepto a Cristo?" What do you say?',prompt:'Choose the most biblically grounded answer.',correct:'La Biblia dice que estarás con Dios para siempre. Juan 14:2 dice que Jesús fue a preparar un lugar para los que creen en Él.',choices:['La Biblia dice que estarás con Dios para siempre. Juan 14:2 dice que Jesús fue a preparar un lugar para los que creen en Él.','Irás al cielo porque eres una buena persona.','Dios juzga según tus obras y las compara con tus pecados.','La Biblia no habla mucho sobre lo que pasa exactamente después.']},
      {type:'fill',label:'Complete Hebreos 11:1: "___ es la certeza de lo que se espera, la convicción de lo que no se ve."',prompt:'Fill in the blank.',correct:'La fe',choices:['La fe','El amor','La paz','La gracia'],explain:'La fe = faith. Hebrews 11:1 — the classic definition of faith.'},
      {type:'passage',label:'Someone says they\'ve done terrible things and God could never forgive them. Which verse is most helpful?',prompt:'Choose the most applicable verse.',correct:'1 Juan 1:9: Si confesamos nuestros pecados, él es fiel y justo para perdonar nuestros pecados y limpiarnos de toda maldad.',choices:['1 Juan 1:9: Si confesamos nuestros pecados, él es fiel y justo para perdonar nuestros pecados y limpiarnos de toda maldad.','Juan 3:16: Porque de tal manera amó Dios al mundo...','Romanos 8:1: Ninguna condenación hay para los que están en Cristo Jesús.','Salmo 23:1: El Señor es mi pastor; nada me faltará.']},
      {type:'fill',label:'Complete Isaías 53:5: "Él fue ___ por nuestras rebeliones, molido por nuestros pecados."',prompt:'Fill in the blank.',correct:'herido',choices:['herido','amado','enviado','elegido'],explain:'Herido = wounded. Isaiah 53:5 — the suffering servant prophecy fulfilled by Jesus.'},
    ]},
  { id:94, group:'mastery', emoji:'📖', title:'Escrituras IV', subtitle:'Memorization Blitz',
    desc:'Fill in the blanks — these verses should be second nature by trip time.',
    tip:{es:'En mi corazón he guardado tus palabras.',en:'I have hidden your word in my heart.'},
    questions:[
      {type:'fill',label:'Juan 14:6 — Jesús dijo: "Yo soy el ___, la verdad y la vida."',prompt:'Fill in the blank.',correct:'camino',choices:['camino','amor','señor','hijo'],explain:'Camino = the way. Jesus is THE WAY, the truth, and the life.'},
      {type:'fill',label:'Salmo 46:1 — "Dios es nuestro ___ y fortaleza, nuestro pronto auxilio en las tribulaciones."',prompt:'Fill in the blank.',correct:'amparo',choices:['amparo','pastor','rey','padre'],explain:'Amparo = refuge/shelter. God is our refuge and strength.'},
      {type:'fill',label:'Mateo 28:19 — "Por tanto, id y haced ___ a todas las naciones."',prompt:'Fill in the blank.',correct:'discípulos',choices:['discípulos','amigos','milagros','seguidores'],explain:'Discípulos = disciples. The Great Commission — make disciples of ALL nations.'},
      {type:'fill',label:'Proverbios 3:5 — "___ en el Señor con todo tu corazón, y no te apoyes en tu propia prudencia."',prompt:'Fill in the blank.',correct:'Confía',choices:['Confía','Ora','Sirve','Ama'],explain:'Confía = trust. Trust in the Lord with ALL your heart — not your own understanding.'},
      {type:'fill',label:'Gálatas 2:20 — "Con Cristo estoy juntamente ___; y ya no vivo yo, mas vive Cristo en mí."',prompt:'Fill in the blank.',correct:'crucificado',choices:['crucificado','bautizado','nacido','unido'],explain:'Crucificado = crucified. I have been crucified with Christ — it is no longer I who live.'},
      {type:'fill',label:'Colosenses 3:23 — "Y todo lo que hagáis, hacedlo de ___, como para el Señor y no para los hombres."',prompt:'Fill in the blank.',correct:'corazón',choices:['corazón','fe','amor','gracia'],explain:'Corazón = heart. Whatever you do, do it with all your heart, as working for the Lord.'},
      {type:'fill',label:'Marcos 16:15 — "Id por todo el ___ y predicad el evangelio a toda criatura."',prompt:'Fill in the blank.',correct:'mundo',choices:['mundo','país','lugar','pueblo'],explain:'Mundo = world. Go into ALL the world and preach the gospel — that\'s you, going to Mexico!'},
      {type:'fill',label:'1 Pedro 3:15 — "Estad siempre preparados para presentar defensa con mansedumbre y reverencia ante todo el que os demande ___ de la esperanza que hay en vosotros."',prompt:'Fill in the blank.',correct:'razón',choices:['razón','prueba','evidencia','testimonio'],explain:'Razón = reason/account. Always be ready to give a REASON for the hope you have.'},
      {type:'fill',label:'Mateo 5:16 — "Así alumbre vuestra ___ delante de los hombres, para que vean vuestras buenas obras y glorifiquen a vuestro Padre."',prompt:'Fill in the blank.',correct:'luz',choices:['luz','fe','vida','voz'],explain:'Luz = light. Let your LIGHT shine before others so they may see your good deeds.'},
      {type:'fill',label:'Apocalipsis 21:4 — "Enjugará Dios toda ___ de los ojos de ellos; y ya no habrá muerte, ni habrá más llanto, ni clamor, ni dolor."',prompt:'Fill in the blank.',correct:'lágrima',choices:['lágrima','tristeza','enfermedad','oscuridad'],explain:'Lágrima = tear. God will wipe every tear — the ultimate promise of restoration.'},
    ]},
  { id:95, group:'mastery', emoji:'💬', title:'Escrituras en Contexto', subtitle:'Verses for Every Moment',
    desc:'Match the right verse to the right moment in ministry.',
    tip:{es:'La Palabra correcta en el momento correcto puede cambiar una vida.',en:'The right word at the right moment can change a life.'},
    questions:[
      {type:'passage',label:'A child is afraid. Which verse is most comforting?',prompt:'Choose the most appropriate verse.',correct:'No te desampararé, ni te dejaré. (Hebreos 13:5) — I will never leave you nor forsake you.',choices:['No te desampararé, ni te dejaré. (Hebreos 13:5) — I will never leave you nor forsake you.','Todo lo puedo en Cristo. (Filipenses 4:13)','Confía en el Señor con todo tu corazón. (Proverbios 3:5)','Dios es nuestro amparo y fortaleza. (Salmo 46:1)']},
      {type:'passage',label:'Someone is sharing the gospel with a skeptic. Which verse is most direct?',prompt:'Choose the most evangelistic verse.',correct:'Porque de tal manera amó Dios al mundo que dio a su Hijo unigénito. (Juan 3:16)',choices:['Porque de tal manera amó Dios al mundo que dio a su Hijo unigénito. (Juan 3:16)','El Señor es mi pastor; nada me faltará. (Salmo 23:1)','La paz os dejo, mi paz os doy. (Juan 14:27)','Esfuérzate y sé valiente. (Josué 1:9)']},
      {type:'passage',label:'A teammate is exhausted and wants to quit. Which verse is most encouraging?',prompt:'Choose the most encouraging verse.',correct:'Los que esperan en el Señor renovarán sus fuerzas; volarán como las águilas. (Isaías 40:31)',choices:['Los que esperan en el Señor renovarán sus fuerzas; volarán como las águilas. (Isaías 40:31)','Porque de tal manera amó Dios al mundo. (Juan 3:16)','No te desampararé ni te dejaré. (Hebreos 13:5)','La fe es la certeza de lo que se espera. (Hebreos 11:1)']},
      {type:'passage',label:'A man says his sins are too great for God to forgive. Which verse is most helpful?',prompt:'Choose the most applicable verse.',correct:'Si confesamos nuestros pecados, él es fiel y justo para perdonarlos y limpiarnos. (1 Juan 1:9)',choices:['Si confesamos nuestros pecados, él es fiel y justo para perdonarlos y limpiarnos. (1 Juan 1:9)','Porque de tal manera amó Dios al mundo. (Juan 3:16)','El Señor es mi luz y mi salvación. (Salmo 27:1)','Yo soy el camino, la verdad y la vida. (Juan 14:6)']},
      {type:'passage',label:'A teenager says life has no purpose. Which verse speaks most directly?',prompt:'Choose the most purposeful verse.',correct:'Porque somos hechura de Dios, creados en Cristo Jesús para buenas obras. (Efesios 2:10)',choices:['Porque somos hechura de Dios, creados en Cristo Jesús para buenas obras. (Efesios 2:10)','El amor es sufrido, es benigno. (1 Corintios 13:4)','No te desampararé ni te dejaré. (Hebreos 13:5)','Porque yo sé los planes que tengo para vosotros. (Jeremías 29:11)']},
      {type:'passage',label:'Your whole team is about to go out for the day\'s work. Which verse is best to open with?',prompt:'Choose the best commissioning verse.',correct:'Id por todo el mundo y predicad el evangelio a toda criatura. (Marcos 16:15)',choices:['Id por todo el mundo y predicad el evangelio a toda criatura. (Marcos 16:15)','Confía en el Señor con todo tu corazón. (Proverbios 3:5)','El Señor es mi pastor; nada me faltará. (Salmo 23:1)','No os conforméis a este siglo. (Romanos 12:2)']},
      {type:'passage',label:'Someone is struggling with anxiety about the trip. Which verse is most calming?',prompt:'Choose the most peace-giving verse.',correct:'La paz os dejo, mi paz os doy; no se turbe vuestro corazón, ni tenga miedo. (Juan 14:27)',choices:['La paz os dejo, mi paz os doy; no se turbe vuestro corazón, ni tenga miedo. (Juan 14:27)','Todo lo puedo en Cristo que me fortalece. (Filipenses 4:13)','El amor es sufrido, es benigno. (1 Corintios 13:4)','Esfuérzate y sé valiente. (Josué 1:9)']},
      {type:'passage',label:'A church member asks why you do such hard work for no money. Which verse explains it best?',prompt:'Choose the most servant-heart verse.',correct:'Y todo lo que hagáis, hacedlo de corazón, como para el Señor y no para los hombres. (Colosenses 3:23)',choices:['Y todo lo que hagáis, hacedlo de corazón, como para el Señor y no para los hombres. (Colosenses 3:23)','Porque somos hechura de Dios, creados para buenas obras. (Efesios 2:10)','Confía en el Señor con todo tu corazón. (Proverbios 3:5)','Id y haced discípulos a todas las naciones. (Mateo 28:19)']},
      {type:'passage',label:'Someone on the team starts to feel proud about how much they\'ve accomplished. Which verse is a good reminder?',prompt:'Choose the most humbling verse.',correct:'Con Cristo estoy juntamente crucificado; y ya no vivo yo, mas vive Cristo en mí. (Gálatas 2:20)',choices:['Con Cristo estoy juntamente crucificado; y ya no vivo yo, mas vive Cristo en mí. (Gálatas 2:20)','Todo lo puedo en Cristo que me fortalece. (Filipenses 4:13)','Id y haced discípulos. (Mateo 28:19)','Así alumbre vuestra luz delante de los hombres. (Mateo 5:16)']},
      {type:'passage',label:'It\'s the last day and the team is emotional. Which verse is the best send-off?',prompt:'Choose the most sending verse.',correct:'Así alumbre vuestra luz delante de los hombres, para que vean vuestras buenas obras y glorifiquen a vuestro Padre. (Mateo 5:16)',choices:['Así alumbre vuestra luz delante de los hombres, para que vean vuestras buenas obras y glorifiquen a vuestro Padre. (Mateo 5:16)','La paz os dejo, mi paz os doy. (Juan 14:27)','El Señor es mi luz y mi salvación. (Salmo 27:1)','No te desampararé ni te dejaré. (Hebreos 13:5)']},
    ]},

  { id:96, group:'mastery', emoji:'🎭', title:'Simulación: Corte', subtitle:'A Full Haircut Conversation',
    desc:'One complete haircut from hello to goodbye — 10 exchanges.',
    tip:{es:'Cada corte de pelo es una conversación sobre dignidad.',en:'Every haircut is a conversation about dignity.'},
    questions:[
      {type:'passage',label:'Step 1: The child arrives. How do you welcome them?',prompt:'Choose the best opening.',correct:'¡Hola! ¿Cómo te llamas? Ven, siéntate aquí. ¡No te preocupes, no duele nada!',choices:['¡Hola! ¿Cómo te llamas? Ven, siéntate aquí. ¡No te preocupes, no duele nada!','Siéntate. ¿Quieres pelo corto o largo?','¡Siguiente! ¿Cómo te llamas?','¡Hola! ¿Estás listo para tu corte?']},
      {type:'fill',label:'Step 2: Ask how old they are.',prompt:'¿Cuántos ___ tienes?',correct:'años',choices:['años','hermanos','amigos','juguetes']},
      {type:'passage',label:'Step 3: Ask how they want their hair.',prompt:'Choose the best way to ask.',correct:'¿Lo quieres muy corto, un poco corto, o solo un recorte?',choices:['¿Lo quieres muy corto, un poco corto, o solo un recorte?','¿Corto o largo?','¿Cómo lo quieres?','Dime qué estilo quieres.']},
      {type:'fill',label:'Step 4: Tell them to sit still.',prompt:'Por favor, quédate ___.',correct:'quieto',choices:['quieto','aquí','listo','solo']},
      {type:'passage',label:'Step 5: The child gets nervous. What do you say?',prompt:'Choose the most calming response.',correct:'Tranquilo. Soy muy cuidadoso. ¿Ves? Solo voy a cortar un poquito. ¿Tienes un color favorito?',choices:['Tranquilo. Soy muy cuidadoso. ¿Ves? Solo voy a cortar un poquito. ¿Tienes un color favorito?','No te muevas o no puedo cortar bien.','Casi termino. Solo un momento más.','¿Tienes miedo? ¡Es solo el pelo!']},
      {type:'fill',label:'Step 6: Tell them it\'s almost done.',prompt:'¡Ya ___ terminar!',correct:'vamos a',choices:['vamos a','quiero','podemos','voy a']},
      {type:'passage',label:'Step 7: You\'re done. Show them the mirror. What do you say?',prompt:'Choose the best response.',correct:'¡Listo! Mira qué guapo quedaste. ¿Te gusta?',choices:['¡Listo! Mira qué guapo quedaste. ¿Te gusta?','Terminé. ¿Está bien?','Ya puedes irte. Siguiente.','¿Cómo quedó? ¿Bien?']},

function prog(pid) {
  if(!G.progress[pid]) G.progress[pid]={scores:{},points:0};
  return G.progress[pid];
}
function completedInGroup(pid,groupId) {
  const p=prog(pid);
  const group=GROUPS.find(g=>g.id===groupId);
  return group.levels.filter(id=>p.scores[id]).length;
}
function isGroupUnlocked(pid,groupId) {
  const group=GROUPS.find(g=>g.id===groupId);
  if(!group.unlockAfter) return true;
  return completedInGroup(pid,group.unlockAfter)>=group.unlockCount;
}
function totalStars(pid) {
  return Object.values(prog(pid).scores).reduce((s,x)=>s+x.stars,0);
}

// ============================================================
// QUESTION GENERATION
// ============================================================
function makeQuestions(level) {
  if(level.questions) return shuffle(level.questions.map(q=>({...q,choices:shuffle([...q.choices])})));
  const vocab=level.vocab;
  const shuffled=shuffle([...vocab]);
  const qs=[];
  for(let i=0;i<Math.min(10,shuffled.length);i++){
    const item=shuffled[i];
    const others=shuffle(vocab.filter(v=>v!==item));
    const isForward=Math.random()<0.5;
    if(isForward){
      const choices=shuffle([item.en,...others.slice(0,3).map(o=>o.en)]);
      qs.push({prompt:item.es,label:'What does this mean in English?',correct:item.en,choices,translation:`"${item.es}" = ${item.en}`});
    } else {
      const choices=shuffle([item.es,...others.slice(0,3).map(o=>o.es)]);
      qs.push({prompt:item.en,label:'How do you say this in Spanish?',correct:item.es,choices,translation:`"${item.en}" in Spanish is "${item.es}"`});
    }
  }
  return shuffle(qs);
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function enc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function beep(type) {
  try {
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain();g.connect(ctx.destination);const now=ctx.currentTime;
    if(type==='ok'){[[523.25,0],[659.25,.1],[783.99,.2]].forEach(([f,t])=>{const o=ctx.createOscillator();o.connect(g);o.frequency.value=f;g.gain.setValueAtTime(0.22,now+t);g.gain.exponentialRampToValueAtTime(0.001,now+t+0.28);o.start(now+t);o.stop(now+t+0.28);});}
    else if(type==='bad'){const o=ctx.createOscillator();o.connect(g);o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(140,now+0.3);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);o.start(now);o.stop(now+0.35);}
    else if(type==='win'){[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ctx.createOscillator();const gg=ctx.createGain();o.connect(gg);gg.connect(ctx.destination);o.frequency.value=f;gg.gain.setValueAtTime(0.25,now+i*0.13);gg.gain.exponentialRampToValueAtTime(0.001,now+i*0.13+0.35);o.start(now+i*0.13);o.stop(now+i*0.13+0.35);});}
  } catch(e){}
}
function confetti() {
  const c=document.getElementById('confetti');
  const cols=['#dc2626','#16a34a','#fbbf24','#2563eb','#7c3aed','#f97316','#fff'];
  for(let i=0;i<90;i++){const p=document.createElement('div');p.className='cp';const size=7+Math.random()*8;p.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.6+Math.random()*2}s;animation-delay:${Math.random()*0.9}s;`;c.appendChild(p);setTimeout(()=>p.remove(),4500);}
}

function showQ() {
  G.answerLocked=false;
  const q=G.questions[G.qIdx];const total=G.questions.length;
  const pct=Math.round(G.qIdx/total*100);
  const lv=G.level;
  const hc=lv.group==='grammar'?'var(--blue)':lv.group==='conversation'?'var(--orange)':lv.group==='mastery'?'var(--teal)':'var(--green)';
  const onecol=(q.type==='passage')||(q.type==='fill')||q.choices.some(c=>c.length>24);
  let qCard;
  if(q.type==='passage'){
    const html=enc(q.prompt).replace(/\\n/g,'<br>');
    qCard=`<div class="q-card bounce-in" style="text-align:left;"><div class="q-label" style="text-align:center;">${enc(q.label)}</div><div class="passage-block">${html}</div></div>`;
  } else if(q.type==='fill'){
    const html=enc(q.prompt).replace(/___/g,'<span class="blank-slot">___</span>');
    qCard=`<div class="q-card bounce-in"><div class="q-label">${enc(q.label)}</div><div class="fill-sentence">${html}</div></div>`;
  } else {
    // For vocab questions the prompt is Spanish — add speak button
    const isSpanish = q.label && q.label.includes('English');
    const speakTarget = isSpanish ? q.prompt : '';
    qCard=`<div class="q-card bounce-in"><div class="q-label">${enc(q.label)}</div><div class="q-text">${enc(q.prompt)}${speakTarget?` ${speakBtn(speakTarget)}`:''}`;
    qCard+=`</div></div>`;
  }
  go(`<div>
    <div class="flex items-center gap-3" style="padding:12px 0;">
      <button class="back-btn" onclick="quitConfirm()">✕</button>
      <div class="progress-wrap" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${hc},${hc}88);"></div></div>
      <div class="hearts">${'❤️'.repeat(G.hearts)}${'🖤'.repeat(3-G.hearts)}</div>
    </div>
    <div class="text-xs text-gray text-center mb-1">Question ${G.qIdx+1} of ${total}</div>
    ${qCard}
    <div class="ans-grid" id="ansGrid" data-correct="${enc(q.correct)}" data-explain="${enc(q.explain||'')}" data-translation="${enc(q.translation||'')}" style="grid-template-columns:${onecol?'1fr':'1fr 1fr'}">
      ${q.choices.map(c=>`<button class="ans-btn ${onecol?'tall':''}" data-val="${enc(c)}" onclick="checkAns(this)">${enc(c)}</button>`).join('')}
    </div>
    <div id="fb" style="min-height:58px;margin-top:10px;"></div>
  </div>`);
}
function checkAns(btn) {
  if(G.answerLocked)return;G.answerLocked=true;
  const chosen=btn.getAttribute('data-val');
  const grid=document.getElementById('ansGrid');
  const correct=grid.getAttribute('data-correct');
  const explain=grid.getAttribute('data-explain')||'';
  const translation=grid.getAttribute('data-translation')||'';
  const isOk=chosen===correct;
  document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
  if(isOk){
    btn.classList.add('correct');G.score+=10;G.answers.push(true);beep('ok');
    const p=['¡Excelente! 🎉','¡Muy bien! ✅','¡Perfecto! 🌟','¡Correcto! 🔥','¡Sí! 👏','¡Increíble! 💪','¡Así se hace! 🙌'];
    let extra='';
    // Auto-speak the correct Spanish answer
    const correctSpanish = G.questions[G.qIdx] && G.questions[G.qIdx].prompt && !G.questions[G.qIdx].type ? correct : (grid.getAttribute('data-es')||'');
    if(correctSpanish) setTimeout(()=>speak(correctSpanish), 300);
    else setTimeout(()=>speak(correct, 0.8), 300);
    if(translation) extra=`<div class="explain-box"><span class="explain-correct">📖 ${enc(translation)}</span> ${speakBtn(correct)}</div>`;
    else if(explain) extra=`<div class="explain-box"><span class="explain-why">💡 ${enc(explain)}</span></div>`;
    document.getElementById('fb').innerHTML=`<div class="feedback-box ok">${p[Math.floor(Math.random()*p.length)]}</div>${extra}`;
  } else {
    btn.classList.add('wrong');btn.classList.add('shake-it');G.hearts--;G.answers.push(false);beep('bad');
    document.querySelectorAll('.ans-btn').forEach(b=>{if(b.getAttribute('data-val')===correct)b.classList.add('correct');});
    let extra='';
    // Speak the correct answer after a short delay
    setTimeout(()=>speak(correct, 0.8), 600);
    if(explain) extra=`<div class="explain-box"><span class="explain-correct">✅ <strong>${enc(correct)}</strong></span> ${speakBtn(correct)}<br><span class="explain-why">💡 ${enc(explain)}</span></div>`;
    else if(translation) extra=`<div class="explain-box"><span class="explain-correct">✅ <strong>${enc(correct)}</strong></span> ${speakBtn(correct)}<br><span class="explain-why">📖 ${enc(translation)}</span></div>`;
    else extra=`<div class="explain-box"><span class="explain-correct">✅ Correct answer: <strong>${enc(correct)}</strong></span> ${speakBtn(correct)}</div>`;
    document.getElementById('fb').innerHTML=`<div class="feedback-box bad">Not quite!</div>${extra}`;
  }
  setTimeout(()=>{G.qIdx++;if(G.qIdx>=G.questions.length||G.hearts<=0)showComplete();else showQ();},isOk?1400:2200);
}
function quitConfirm(){if(confirm("Quit this level? Progress won't be saved."))showMap();}

// ---------- COMPLETE ----------
function showComplete() {
  const lv=G.level;const total=G.questions.length;
  const correct=G.answers.filter(Boolean).length;
  const pct=Math.round(correct/total*100);
  const stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  const passed=stars>0;
  if(passed&&G.activePlayer){
    const p=prog(G.activePlayer.id);const prev=p.scores[lv.id];
    const newPts=stars*100+(pct===100?50:0);
    if(!prev||stars>prev.stars){
      const oldPts=prev?prev.stars*100:0;
      p.points=(p.points||0)+newPts-oldPts;
      p.scores[lv.id]={stars,score:pct};save();
    }
    if(stars===3||!prev||stars>prev.stars){beep('win');setTimeout(confetti,350);}
    else beep('ok');
  } else beep('bad');
  const currentIdx=LEVELS.findIndex(l=>l.id===lv.id);
  const next=LEVELS[currentIdx+1]||null;
  go(`<div class="bounce-in" style="padding-bottom:24px;">
    <div style="text-align:center;padding:28px 0 14px;">
      <div class="text-xs text-gray uppercase mb-2">${passed?'Level Complete! 🎊':'Keep Practicing!'}</div>
      <div style="font-size:4rem">${passed?(stars===3?'🏆':stars===2?'🎯':'🌟'):'💪'}</div>
      <div class="big-stars">${[1,2,3].map(s=>`<span class="star-slot" id="s${s}">⭐</span>`).join('')}</div>
      <div style="font-size:2.2rem;font-weight:900;">${pct}%</div>
      <div class="text-gray text-sm">${correct} of ${total} correct</div>
      ${passed?`<div style="background:#dcfce7;border-radius:12px;padding:9px 16px;margin:14px auto;font-size:.9rem;color:#15803d;font-weight:700;display:inline-block;">+${stars*100}${pct===100?' + 50 bonus':''} points! 🎉</div>`
              :`<div style="background:#fee2e2;border-radius:12px;padding:9px 16px;margin:14px auto;font-size:.9rem;color:#dc2626;font-weight:700;display:inline-block;">Need 50% to pass — you've got this!</div>`}
    </div>
    <div class="tip-card">
      <div class="tip-label">🇲🇽 Mission Trip Phrase</div>
      <div class="tip-es">"${enc(lv.tip.es)}"</div>
      <div class="tip-en">${enc(lv.tip.en)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${passed&&next?`<button class="btn btn-full btn-lg ${next.isLesson?'btn-blue':'btn-primary'}" onclick="startIntro(${next.id})">➡️ Next: ${enc(next.title)}</button>`:''}
      ${passed&&!next?`<button class="btn btn-full btn-lg btn-purple" onclick="showHome()">🇲🇽 ¡Felicidades! Course Complete!</button>`:''}
      <button class="btn btn-outline btn-full" onclick="startLevel(${lv.id})">🔄 ${passed?'Play Again':'Try Again'}</button>
      <button class="btn btn-ghost btn-full" onclick="showMap()">🗺️ Back to Levels</button>
    </div>
  </div>`);
  [1,2,3].forEach(s=>{setTimeout(()=>{const el=document.getElementById(`s${s}`);if(el){if(s<=stars)el.classList.add('lit');else el.style.filter='grayscale(1) opacity(0.25)';}},s*350);});
}

function showSaveCode() {
  go(`<div>
    <div class="flex items-center gap-2" style="padding:14px 0;">
      <button class="back-btn" onclick="showHome()">←</button>
      <h2>💾 Save &amp; Load Progress</h2>
    </div>
    <div class="card">
      <div style="font-size:2rem;text-align:center;margin-bottom:8px;">📲</div>
      <h3 class="mb-2 text-center">Works on Any Device</h3>
      <p class="text-sm text-gray text-center mb-3">Save progress as a file. Load it on any phone, tablet, or computer — no account needed.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin:12px 0;">
        <div style="background:#f8fafc;border-radius:12px;padding:12px 8px;"><div style="font-size:1.6rem">💻</div><div class="text-xs text-gray mt-1">Mac / PC</div></div>
        <div style="background:#f8fafc;border-radius:12px;padding:12px 8px;"><div style="font-size:1.6rem">📱</div><div class="text-xs text-gray mt-1">iPhone / iPad</div></div>
        <div style="background:#f8fafc;border-radius:12px;padding:12px 8px;"><div style="font-size:1.6rem">🤖</div><div class="text-xs text-gray mt-1">Android</div></div>
      </div>
    </div>
    <div class="card">
      <h3 class="mb-1">⬇️ Save Progress to File</h3>
      <p class="text-sm text-gray mb-3">Downloads a small file with everyone's scores.</p>
      ${G.players.length>0?`
        <button class="btn btn-primary btn-full btn-lg" onclick="downloadSave()">⬇️ Download Progress File</button>
        <div id="dlMsg" style="text-align:center;font-size:.85rem;color:#16a34a;min-height:22px;margin-top:8px;"></div>`
      :`<div class="text-gray text-sm text-center" style="padding:12px;background:#f8fafc;border-radius:10px;">Add a player first before saving.</div>`}
    </div>
    <div class="card">
      <h3 class="mb-1">⬆️ Load Progress from File</h3>
      <p class="text-sm text-gray mb-3">Pick your progress file to restore scores on this device. Works even before adding a player!</p>
      <input type="file" id="saveFileInput" accept=".json,application/json" style="display:none" onchange="loadSaveFile(this)">
      <button class="btn btn-outline btn-full btn-lg" onclick="document.getElementById('saveFileInput').click()">📂 Choose Progress File</button>
      <div id="ldMsg" style="text-align:center;font-size:.85rem;min-height:22px;margin-top:8px;"></div>
    </div>
  </div>`);
}
function downloadSave() {
  const data={players:G.players,progress:G.progress,savedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='vamos-mexico-progress.json';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  const msg=document.getElementById('dlMsg');
  if(msg)msg.textContent='✅ File downloaded! Share it to transfer progress.';
}
function loadSaveFile(input) {
  const file=input.files[0];if(!file)return;
  const msg=document.getElementById('ldMsg');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.players||!Array.isArray(data.players))throw new Error('bad');
      const result=mergeSaveData(data);save();
      msg.style.color='#16a34a';
      msg.textContent=`✅ Loaded! ${result.added} player(s) added, ${result.updated} updated. Redirecting...`;
      setTimeout(showHome,1400);
    }catch(err){msg.style.color='#dc2626';msg.textContent="❌ That file doesn't look right. Please try again.";}
  };
  reader.onerror=function(){msg.style.color='#dc2626';msg.textContent='❌ Could not read file.';};
  reader.readAsText(file);
}
function mergeSaveData(imported) {
  const importedProgress=imported.progress||{};let added=0,updated=0;
  imported.players.forEach(imp=>{
    const localIdx=G.players.findIndex(p=>p.id===imp.id);
    if(localIdx===-1){G.players.push(imp);G.progress[imp.id]=importedProgress[imp.id]||{scores:{},points:0};added++;}
    else{
      G.players[localIdx]={...G.players[localIdx],...imp};
      const local=prog(imp.id);const remote=importedProgress[imp.id]||{scores:{},points:0};
      const allIds=new Set([...Object.keys(local.scores),...Object.keys(remote.scores)]);
      allIds.forEach(lid=>{const l=local.scores[lid];const r=remote.scores[lid];if(!l)local.scores[lid]=r;else if(r&&r.stars>l.stars)local.scores[lid]=r;});
      local.points=Object.values(local.scores).reduce((sum,s)=>sum+s.stars*100+(s.score===100?50:0),0);
      if(G.activePlayer&&G.activePlayer.id===imp.id)G.activePlayer=G.players[localIdx];
      updated++;
    }
  });
  return {added,updated};
}

function showEditPlayer(id){

  _av=player.avatar;_cl=player.color;
  go(`<div>
    <div class="flex items-center gap-2" style="padding:14px 0;">
      <button class="back-btn" onclick="showHome()">←</button>
      <h2>Edit Profile</h2>
    </div>

      <h3 class="mb-2 mt-3">Choose Color</h3>
      <div class="color-row">${COLORS.map(c=>`<div class="color-dot ${c===_cl?'sel':''}" style="background:${c}" onclick="pickCl(this,'${c}')"></div>`).join('')}</div>

    </div>
  </div>`);
}
function pickAv(el,av){_av=av;document.querySelectorAll('.avatar-opt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function pickCl(el,cl){_cl=cl;document.querySelectorAll('.color-dot').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function createPlayer(){
  const name=(document.getElementById('pname').value||'').trim();
  if(!name){const f=document.getElementById('pname');f.classList.add('error');f.placeholder='Please enter a name!';f.focus();return;}
  const player={id:Date.now().toString(),name,avatar:_av||'😊',color:_cl||'#16a34a'};
  G.players.push(player);G.activePlayer=player;save();showHome();
}
function saveEditPlayer(id){
  const name=(document.getElementById('pname').value||'').trim();
  if(!name){document.getElementById('pname').classList.add('error');return;}
  const idx=G.players.findIndex(p=>p.id===id);if(idx===-1)return;
  G.players[idx]={...G.players[idx],name,avatar:_av,color:_cl};
  if(G.activePlayer&&G.activePlayer.id===id)G.activePlayer=G.players[idx];
  save();showHome();
}
function confirmDeletePlayer(id){
  const player=G.players.find(p=>p.id===id);if(!player)return;
  if(!confirm(`Delete ${player.name}? All progress will be lost.`))return;
  G.players=G.players.filter(p=>p.id!==id);delete G.progress[id];
  if(G.activePlayer&&G.activePlayer.id===id)G.activePlayer=null;
  save();showHome();
}


// ============================================================
// DICTIONARY SCREEN
// ============================================================
function showDict() {
  DS.view='az'; DS.search=''; DS.group=null;
  renderDict();
}

function renderDict() {
  const views=[
    {id:'az',label:'A–Z'},
    {id:'grammar',label:'Grammar Type'},
    {id:'topic',label:'By Topic'},
  ];
  const tabsHtml=views.map(v=>`<div class="dict-tab ${DS.view===v.id?'active':''}" onclick="setDictView('${v.id}')">${v.label}</div>`).join('');

  let listHtml='';
  const q=(DS.search||'').toLowerCase().trim();
  const filtered=DICT_ENTRIES.filter(e=>!q||(e.es.toLowerCase().includes(q)||e.en.toLowerCase().includes(q)||e.type.includes(q)||e.topic.toLowerCase().includes(q)));

  if(DS.view==='az'){
    const sorted=[...filtered].sort((a,b)=>a.es.localeCompare(b.es,'es'));
    let lastLetter='';
    sorted.forEach(e=>{
      const letter=e.es[0].toUpperCase();
      if(letter!==lastLetter){listHtml+=`<div class="dict-section">${letter}</div>`;lastLetter=letter;}
      listHtml+=dictEntry(e);
    });
  } else if(DS.view==='grammar'){
    const typeOrder=['noun','verb','adjective','article','phrase','greeting','number','question','connector','preposition'];
    const byType={};
    filtered.forEach(e=>{if(!byType[e.type])byType[e.type]=[];byType[e.type].push(e);});
    typeOrder.forEach(t=>{
      if(!byType[t])return;
      const label=TYPE_LABELS[t]||t;
      const color=TYPE_COLORS[t]||'#64748b';
      listHtml+=`<div class="dict-section" style="color:${color}">${label}s (${byType[t].length})</div>`;
      byType[t].sort((a,b)=>a.es.localeCompare(b.es,'es')).forEach(e=>{listHtml+=dictEntry(e);});
    });
  } else {
    const topicOrder=['Greetings','Introductions','Family','Numbers','Days & Time','Colors','Feelings','Body','Animals','Weather','Places','Clothing','Food & Water','Faith & Church','Haircut Station','Bike Repair','Action Verbs','Mission Trip','Navigation','Grammar: Articles','Grammar: Verbs','Question Words','Connectors','Prepositions'];
    const byTopic={};
    filtered.forEach(e=>{if(!byTopic[e.topic])byTopic[e.topic]=[];byTopic[e.topic].push(e);});
    const topicsSorted=[...topicOrder.filter(t=>byTopic[t]),...Object.keys(byTopic).filter(t=>!topicOrder.includes(t))];
    topicsSorted.forEach(t=>{
      listHtml+=`<div class="dict-section">📌 ${t} (${byTopic[t].length})</div>`;
      byTopic[t].forEach(e=>{listHtml+=dictEntry(e);});
    });
  }

  if(!listHtml) listHtml=`<div class="text-center text-gray" style="padding:24px;">No words found for "<strong>${enc(q)}</strong>"</div>`;

  go(`<div>
    <div class="flex items-center gap-2" style="padding:14px 0;">
      <button class="back-btn" onclick="showHome()">←</button>
      <h2>📖 Dictionary</h2>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <div class="text-xs text-gray">${DICT_ENTRIES.length} words</div>
        <button class="btn btn-outline btn-sm" onclick="printDict()">🖨️ Print</button>
      </div>
    </div>
    <input class="dict-search" placeholder="🔍 Search Spanish or English..." value="${enc(DS.search)}" oninput="DS.search=this.value;renderDict()" id="dictSearch">
    <div class="dict-tabs">${tabsHtml}</div>
    <div id="dictList">${listHtml}</div>
  </div>`);
  // Re-focus search box after render
  const s=document.getElementById('dictSearch');
  if(s&&DS.search){s.focus();s.setSelectionRange(s.value.length,s.value.length);}
}

function dictEntry(e){
  const color=TYPE_COLORS[e.type]||'#64748b';
  const label=TYPE_LABELS[e.type]||e.type;
  return `<div class="dict-entry">
    <div style="flex:1">
      <div class="dict-es">${enc(e.es)} ${speakBtn(e.es)}</div>
      <div class="dict-en">${enc(e.en)}</div>
    </div>
    <div class="dict-tag" style="background:${color}22;color:${color}">${label}</div>
  </div>`;
}

function setDictView(v){DS.view=v;renderDict();}


// ============================================================
// AUDIO PRONUNCIATION
// ============================================================
function speak(text, rate=0.85) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-MX';
  u.rate = rate;
  u.pitch = 1;
  // Try to pick a Spanish voice
  const voices = window.speechSynthesis.getVoices();
  const es = voices.find(v=>v.lang.startsWith('es-MX')) ||
             voices.find(v=>v.lang.startsWith('es')) ||
             null;
  if(es) u.voice = es;
  window.speechSynthesis.speak(u);
}
function speakBtn(text) {
  return `<button onclick="event.stopPropagation();speak('${text.replace(/'/g,"\'")}')" 
    style="background:none;border:none;cursor:pointer;font-size:1.1rem;padding:2px 5px;opacity:.65;transition:opacity .15s;vertical-align:middle;"
    onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.65"
    title="Hear pronunciation">🔊</button>`;
}


// ============================================================
// PRINT
// ============================================================
function printDict() {
  // Group entries by topic for printing
  const topicOrder = [
    'Greetings','Introductions','Family','Numbers','Days & Time','Colors','Feelings',
    'Body','Animals','Weather','Places','Clothing','Food & Water','Faith & Church',
    'Haircut Station','Bike Repair','Action Verbs','Mission Trip','Navigation',
    'Grammar: Articles','Grammar: Verbs','Question Words','Connectors','Prepositions'
  ];
  const byTopic = {};
  DICT_ENTRIES.forEach(e => {
    if(!byTopic[e.topic]) byTopic[e.topic] = [];
    byTopic[e.topic].push(e);
  });
  const topics = [...topicOrder.filter(t=>byTopic[t]), ...Object.keys(byTopic).filter(t=>!topicOrder.includes(t))];

  let html = `
    <div class="print-header">
      <div class="print-flag"><div style="background:#006847"></div><div style="background:#fff;border:1px solid #eee"></div><div style="background:#ce1126"></div></div>
      <div class="print-title">¡Vamos a México!</div>
      <div class="print-subtitle">Mission Trip Spanish Dictionary &nbsp;·&nbsp; Calvary Chapel Queen Creek &nbsp;·&nbsp; ${new Date().getFullYear()}</div>
      <div class="print-flag"><div style="background:#006847"></div><div style="background:#fff;border:1px solid #eee"></div><div style="background:#ce1126"></div></div>
    </div>
    <div class="print-cols">
  `;

  topics.forEach(topic => {
    const entries = byTopic[topic];
    html += `<div class="print-section-title">${topic}</div>`;
    entries.forEach(e => {
      const typeLabel = TYPE_LABELS[e.type] || e.type;
      html += `<div class="print-entry">
        <span class="print-es">${enc(e.es)}</span>
        <span class="print-en">${enc(e.en)}</span>
        <span class="print-type">${typeLabel}</span>
      </div>`;
    });
  });

  html += `</div>
    <div class="print-footer">
      ¡Dios les bendiga! &nbsp;·&nbsp; ${DICT_ENTRIES.length} words &nbsp;·&nbsp; vamos-a-mexico game
    </div>`;

  document.getElementById('print-sheet').innerHTML = html;
  setTimeout(() => { window.print(); }, 150);
}

  const blob=new Blob([swCode],{type:'application/javascript'});
