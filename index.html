<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Vamos a México! 🇲🇽 Family Spanish</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #dc2626; --green: #16a34a; --green-dark: #15803d;
  --yellow: #fbbf24; --blue: #2563eb; --purple: #7c3aed;
  --bg: #fef9f0; --card: #ffffff; --text: #1e293b;
  --gray: #64748b; --border: #e2e8f0;
  --radius: 16px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.12);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 620px; margin: 0 auto; padding: 16px; min-height: 100vh; }

/* ---- TYPOGRAPHY ---- */
h1 { font-size: 2rem; font-weight: 900; }
h2 { font-size: 1.3rem; font-weight: 800; }
h3 { font-size: 1rem; font-weight: 700; }
.text-sm { font-size: 0.85rem; }
.text-xs { font-size: 0.75rem; }
.text-gray { color: var(--gray); }
.text-center { text-align: center; }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.uppercase { text-transform: uppercase; letter-spacing: 1px; }

/* ---- LAYOUT ---- */
.card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 14px; }
.card-inner { background: #f8fafc; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }

/* ---- BUTTONS ---- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 12px; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; text-decoration: none; user-select: none; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.96); }
.btn-full { width: 100%; }
.btn-lg { padding: 16px 24px; font-size: 1.05rem; }
.btn-sm { padding: 7px 14px; font-size: 0.85rem; }
.btn-primary { background: var(--green); color: white; box-shadow: 0 4px 0 var(--green-dark); }
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:active { box-shadow: none; transform: translateY(4px) scale(1); }
.btn-red { background: var(--red); color: white; box-shadow: 0 4px 0 #991b1b; }
.btn-red:active { box-shadow: none; transform: translateY(4px) scale(1); }
.btn-outline { background: transparent; color: var(--green); border: 2.5px solid var(--green); }
.btn-outline:hover { background: #f0fdf4; }
.btn-ghost { background: transparent; color: var(--gray); border: 2px solid var(--border); }
.btn-ghost:hover { background: var(--border); }

/* ---- INPUT ---- */
.input-field { width: 100%; padding: 12px 16px; border: 2.5px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.15s; background: white; color: var(--text); }
.input-field:focus { border-color: var(--green); }
.input-field.error { border-color: var(--red); }

/* ---- HEADER ---- */
.game-header { text-align: center; padding: 16px 0 8px; }
.game-title { font-size: 2.2rem; font-weight: 900; color: var(--red); text-shadow: 3px 3px 0 #fbbf2488; }
.flag-strip { display: flex; height: 6px; border-radius: 100px; overflow: hidden; margin: 8px 0; }
.flag-strip > div { flex: 1; }

/* ---- BACK BUTTON ---- */
.back-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 8px 10px; border-radius: 10px; transition: background 0.15s; color: var(--text); }
.back-btn:hover { background: var(--border); }

/* ---- PLAYER SETUP ---- */
.avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; }
.avatar-opt { aspect-ratio: 1; font-size: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 3px solid transparent; cursor: pointer; transition: all 0.15s; background: #f1f5f9; }
.avatar-opt:hover { transform: scale(1.1); background: #e2e8f0; }
.avatar-opt.sel { border-color: var(--green); background: #dcfce7; transform: scale(1.05); }
.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
.color-dot { width: 38px; height: 38px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s; }
.color-dot:hover { transform: scale(1.2); }
.color-dot.sel { border-color: #1a1a2e; box-shadow: 0 0 0 2px white inset; }

/* ---- PLAYER CHIPS ---- */
.player-chips { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.player-chip { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 100px; border: 3px solid transparent; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.15s; }
.player-chip:hover { transform: scale(1.04); }
.player-chip.sel { border-width: 3px; }

/* ---- LEADERBOARD ---- */
.lb-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 12px; margin-bottom: 7px; }
.lb-item.r1 { background: #fef9c3; }
.lb-item.r2 { background: #f1f5f9; }
.lb-item.r3 { background: #fff7ed; }
.lb-item.r4 { background: #f8fafc; }
.rank-badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; }

/* ---- LEVEL MAP ---- */
.level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.level-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.18s; border: 3px solid transparent; position: relative; overflow: hidden; }
.level-card:hover:not(.locked) { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.level-card.locked { opacity: 0.45; cursor: not-allowed; background: #f8fafc; }
.level-card.done { border-color: var(--green); }
.level-card.next { border-color: var(--yellow); background: #fffbeb; }
.level-num { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.level-emoji { font-size: 2rem; margin: 4px 0; }
.level-title { font-size: 0.95rem; font-weight: 800; }
.level-sub { font-size: 0.78rem; color: var(--gray); }
.level-badge { position: absolute; top: 8px; right: 8px; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 100px; }
.badge-now { background: var(--yellow); color: #7c2d12; }
.badge-done { background: #dcfce7; color: #15803d; }

/* ---- VOCAB PREVIEW ---- */
.vocab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
.vocab-item { background: #f8fafc; border-radius: 8px; padding: 8px 11px; }
.vocab-es { font-weight: 700; font-size: 0.9rem; }
.vocab-en { font-size: 0.78rem; color: var(--gray); }

/* ---- QUESTION SCREEN ---- */
.progress-wrap { background: var(--border); border-radius: 100px; height: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #4ade80); border-radius: 100px; transition: width 0.4s ease; }
.hearts { display: flex; gap: 3px; font-size: 1.2rem; }
.q-card { background: white; border-radius: 20px; padding: 28px 22px; box-shadow: var(--shadow-lg); text-align: center; margin: 14px 0; }
.q-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 10px; }
.q-text { font-size: 2rem; font-weight: 900; color: var(--text); line-height: 1.2; }
.q-sub { font-size: 0.85rem; color: #94a3b8; margin-top: 6px; }
.ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ans-btn { background: #f8fafc; border: 3px solid var(--border); border-radius: 12px; padding: 14px 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.3; color: var(--text); }
.ans-btn:hover:not(:disabled) { background: #dbeafe; border-color: #93c5fd; transform: scale(1.02); }
.ans-btn.correct { background: #dcfce7 !important; border-color: var(--green) !important; color: var(--green-dark) !important; }
.ans-btn.wrong { background: #fee2e2 !important; border-color: var(--red) !important; color: #991b1b !important; }
.feedback-box { text-align: center; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; animation: fadeUp 0.25s ease; }
.feedback-box.ok { background: #dcfce7; color: #15803d; }
.feedback-box.bad { background: #fee2e2; color: #dc2626; }

/* ---- COMPLETION ---- */
.big-stars { display: flex; justify-content: center; gap: 8px; font-size: 3.2rem; margin: 14px 0; }
.star-slot { transition: all 0.4s; filter: grayscale(1) opacity(0.3); }
.star-slot.lit { filter: none; animation: starPop 0.5s cubic-bezier(.36,.07,.19,.97) forwards; }

/* ---- MISSION TIP ---- */
.tip-card { background: linear-gradient(135deg, #16a34a, #0f766e); color: white; border-radius: var(--radius); padding: 20px; margin: 14px 0; text-align: center; }
.tip-label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
.tip-es { font-size: 1.45rem; font-weight: 900; margin: 7px 0 4px; }
.tip-en { font-size: 0.88rem; opacity: 0.85; }

/* ---- CONFETTI ---- */
#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
.cp { position: absolute; border-radius: 3px; animation: fall linear forwards; }

/* ---- ANIMATIONS ---- */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounceIn { 0% { transform: scale(0.85); opacity: 0; } 55% { transform: scale(1.04); } 100% { transform: scale(1); opacity: 1; } }
@keyframes starPop { 0% { transform: scale(0) rotate(-20deg); } 55% { transform: scale(1.35) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-9px); } 60% { transform: translateX(9px); } }
@keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
.bounce-in { animation: bounceIn 0.35s cubic-bezier(.36,.07,.19,.97); }
.shake-it { animation: shake 0.4s ease; }

/* ---- PASSAGE & FILL QUESTION TYPES ---- */
.passage-block {
  background: #f0fdf4;
  border-left: 5px solid var(--green);
  border-radius: 0 12px 12px 0;
  padding: 16px 18px;
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1.65;
  color: var(--text);
  margin: 10px 0 4px;
  text-align: left;
}
.passage-block .speaker { color: var(--green-dark); font-weight: 800; }
.fill-sentence {
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.6;
  color: var(--text);
  text-align: center;
  padding: 10px 4px 4px;
}
.blank-slot {
  display: inline-block;
  background: #fef9c3;
  border-bottom: 3px solid var(--yellow);
  border-radius: 4px;
  padding: 2px 12px;
  color: #92400e;
  font-style: italic;
  min-width: 60px;
  text-align: center;
}
.ans-btn.tall { padding: 12px 14px; font-size: 0.92rem; line-height: 1.35; text-align: left; }

/* ---- EDIT PLAYER MODAL OVERLAY ---- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
.modal-sheet { background: white; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; }

/* ---- SAVE CODE ---- */
.code-box { background: #f1f5f9; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.78rem; word-break: break-all; color: #334155; border: 2px solid var(--border); max-height: 100px; overflow-y: auto; }

/* ---- RESPONSIVE ---- */
@media (max-width: 420px) {
  .level-grid { grid-template-columns: 1fr; }
  .ans-grid { grid-template-columns: 1fr; }
  .q-text { font-size: 1.6rem; }
  .game-title { font-size: 1.8rem; }
}
</style>
</head>

function load() {
  try {
    const p = localStorage.getItem('vm_players');
    const r = localStorage.getItem('vm_progress');
    if (p) G.players = JSON.parse(p);
    if (r) G.progress = JSON.parse(r);
    const ap = localStorage.getItem('vm_active');
    if (ap) G.activePlayer = G.players.find(x => x.id === ap) || null;
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem('vm_players', JSON.stringify(G.players));
    localStorage.setItem('vm_progress', JSON.stringify(G.progress));
    if (G.activePlayer) localStorage.setItem('vm_active', G.activePlayer.id);
  } catch(e) {}
}

function prog(pid) {
  if (!G.progress[pid]) G.progress[pid] = { scores: {}, points: 0 };
  return G.progress[pid];
}

function maxUnlocked(pid) {
  const p = prog(pid);
  for (let i = LEVELS.length; i >= 1; i--) {
    if (p.scores[i]) return Math.min(i + 1, LEVELS.length);
  }
  return 1;
}

function totalStars(pid) {
  return Object.values(prog(pid).scores).reduce((s, x) => s + x.stars, 0);
}

// ============================================================
// QUESTION GENERATION
// ============================================================

function makeQuestions(level) {
  // Levels 21+ have pre-defined questions (passage/fill types)
  if (level.questions) return shuffle([...level.questions]);
  const vocab = level.vocab;
  const shuffled = shuffle([...vocab]);
  const qs = [];
  for (let i = 0; i < Math.min(10, shuffled.length); i++) {
    const item = shuffled[i];
    const others = shuffle(vocab.filter(v => v !== item));
    const isForward = Math.random() < 0.5;
    if (isForward) {
      const choices = shuffle([item.en, ...others.slice(0, 3).map(o => o.en)]);
      qs.push({ prompt: item.es, label: 'What does this mean in English?', correct: item.en, choices });
    } else {
      const choices = shuffle([item.es, ...others.slice(0, 3).map(o => o.es)]);
      qs.push({ prompt: item.en, label: 'How do you say this in Spanish?', correct: item.es, choices });
    }
  }
  return shuffle(qs);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function enc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function beep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'ok') {
      [[523.25,0],[659.25,.1],[783.99,.2]].forEach(([f,t]) => {
        const o = ctx.createOscillator(); o.connect(g);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.22, now+t);
        g.gain.exponentialRampToValueAtTime(0.001, now+t+0.28);
        o.start(now+t); o.stop(now+t+0.28);
      });
    } else if (type === 'bad') {
      const o = ctx.createOscillator(); o.connect(g);
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(140, now+0.3);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.35);
      o.start(now); o.stop(now+0.35);
    } else if (type === 'win') {
      [523.25,659.25,783.99,1046.5].forEach((f,i) => {
        const o = ctx.createOscillator(); const gg = ctx.createGain();
        o.connect(gg); gg.connect(ctx.destination);
        o.frequency.value = f;
        gg.gain.setValueAtTime(0.25, now+i*0.13);
        gg.gain.exponentialRampToValueAtTime(0.001, now+i*0.13+0.35);
        o.start(now+i*0.13); o.stop(now+i*0.13+0.35);
      });
    }
  } catch(e) {}
}

function confetti() {
  const c = document.getElementById('confetti');
  const cols = ['#dc2626','#16a34a','#fbbf24','#2563eb','#7c3aed','#f97316','#fff'];
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    const size = 7 + Math.random() * 8;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.6+Math.random()*2}s;animation-delay:${Math.random()*0.9}s;`;
    c.appendChild(p);
    setTimeout(() => p.remove(), 4500);
  }
}

    stars: totalStars(p.id),
    pts: prog(p.id).points || 0,
    done: Object.keys(prog(p.id).scores).length,
  })).sort((a,b) => b.stars - a.stars || b.pts - a.pts);
  const medals = ['🥇','🥈','🥉'];
  return `
    <div class="card">
      <h3 class="mb-3">🏆 Leaderboard</h3>
      ${sorted.map((p,i) => `
        <div class="lb-item r${Math.min(i+1,4)}">
          <div class="rank-badge" style="background:${i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#d97706':'#e2e8f0'};color:${i<3?'#fff':'#64748b'}">
            ${i<3?medals[i]:i+1}
          </div>
          <div style="font-size:1.6rem">${p.avatar}</div>
          <div style="flex:1">
            <div class="font-bold">${enc(p.name)}</div>

            <div class="text-xs text-gray">${p.pts} pts</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function downloadSave() {
  const data = { players: G.players, progress: G.progress, savedAt: new Date().toISOString() };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vamos-mexico-progress.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const msg = document.getElementById('dlMsg');
  if (msg) msg.textContent = '✅ File downloaded! Share it to transfer progress.';
}

function loadSaveFile(input) {
  const file = input.files[0];
  if (!file) return;
  const msg = document.getElementById('ldMsg');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.players || !Array.isArray(data.players)) throw new Error('bad format');
      const result = mergeSaveData(data);
      save();
      msg.style.color = '#16a34a';
      msg.textContent = `✅ Merged! ${result.added} player(s) added, ${result.updated} updated. Redirecting...`;
      setTimeout(showHome, 1400);
    } catch(err) {
      msg.style.color = '#dc2626';
      msg.textContent = '❌ That file doesn\'t look right. Please try again.';
    }
  };
  reader.onerror = function() {
    msg.style.color = '#dc2626';
    msg.textContent = '❌ Could not read file.';
  };
  reader.readAsText(file);
}

// Merge imported save data into current state.
// Rules:
//   - Player exists on both sides → keep best stars per level, update profile info
//   - Player only in file         → add them and their progress
//   - Player only on device       → leave untouched
function mergeSaveData(imported) {
  const importedProgress = imported.progress || {};
  let added = 0, updated = 0;

  imported.players.forEach(imp => {
    const localIdx = G.players.findIndex(p => p.id === imp.id);
    if (localIdx === -1) {
      // Brand new player — add them wholesale
      G.players.push(imp);
      G.progress[imp.id] = importedProgress[imp.id] || { scores: {}, points: 0 };
      added++;
    } else {
      // Player exists on both sides — merge profile + progress
      G.players[localIdx] = { ...G.players[localIdx], ...imp }; // imported profile wins
      const local  = prog(imp.id);
      const remote = importedProgress[imp.id] || { scores: {}, points: 0 };

      // Merge level scores: take whichever side earned more stars
      const allLevelIds = new Set([
        ...Object.keys(local.scores),
        ...Object.keys(remote.scores)
      ]);
      allLevelIds.forEach(lid => {
        const l = local.scores[lid];
        const r = remote.scores[lid];
        if (!l)                         local.scores[lid] = r;
        else if (r && r.stars > l.stars) local.scores[lid] = r;
        // else keep local (already the best)
      });

      // Recalculate points cleanly from merged scores
      local.points = Object.values(local.scores)
        .reduce((sum, s) => sum + s.stars * 100 + (s.score === 100 ? 50 : 0), 0);

      if (G.activePlayer && G.activePlayer.id === imp.id) {
        G.activePlayer = G.players[localIdx];
      }
      updated++;
    }
  });

  return { added, updated };
}

// ---------- GAME ----------
function startLevel(id) {
  const lv = LEVELS.find(l=>l.id===id);
  if (!lv) return;
  G.level = lv;
  G.questions = makeQuestions(lv);
  G.qIdx = 0; G.score = 0; G.hearts = 3;
  G.answers = []; G.answerLocked = false;
  showQ();
}

function showQ() {
  G.answerLocked = false;
  const q = G.questions[G.qIdx];
  const total = G.questions.length;
  const pct = Math.round(G.qIdx / total * 100);

  const isPassage = q.type === 'passage';
  const isFill    = q.type === 'fill';
  const longChoices = q.choices.some(c => c.length > 24);
  const onecol = isPassage || isFill || longChoices;

  let qCardHtml;
  if (isPassage) {
    const passageHtml = enc(q.prompt).replace(/\n/g, '<br>').replace(/^— /gm, '<span class="speaker">— </span>');
    qCardHtml = `
      <div class="q-card bounce-in" style="text-align:left;">
        <div class="q-label" style="text-align:center;">${enc(q.label)}</div>
        <div class="passage-block">${passageHtml}</div>
      </div>`;
  } else if (isFill) {
    const filledHtml = enc(q.prompt).replace(/___/g, '<span class="blank-slot">___</span>').replace(/\n/g,'<br>');
    qCardHtml = `
      <div class="q-card bounce-in">
        <div class="q-label">${enc(q.label)}</div>
        <div class="fill-sentence">${filledHtml}</div>
      </div>`;
  } else {
    qCardHtml = `
      <div class="q-card bounce-in">
        <div class="q-label">${enc(q.label)}</div>
        <div class="q-text">${enc(q.prompt)}</div>
      </div>`;
  }

  go(`
    <div>
      <div class="flex items-center gap-3" style="padding:12px 0;">
        <button class="back-btn" onclick="quitConfirm()">✕</button>
        <div class="progress-wrap" style="flex:1">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="hearts">
          ${'❤️'.repeat(G.hearts)}${'🖤'.repeat(3-G.hearts)}
        </div>
      </div>
      <div class="text-xs text-gray text-center mb-1">Question ${G.qIdx+1} of ${total}</div>
      ${qCardHtml}
      <div class="ans-grid" id="ansGrid" data-correct="${enc(q.correct)}"
           style="grid-template-columns:${onecol?'1fr':'1fr 1fr'}">
        ${q.choices.map(c=>`
          <button class="ans-btn ${onecol?'tall':''}" data-val="${enc(c)}" onclick="checkAns(this)">
            ${enc(c)}
          </button>
        `).join('')}
      </div>
      <div id="fb" style="min-height:58px;margin-top:10px;"></div>
    </div>
  `);
}

function checkAns(btn) {
  if (G.answerLocked) return;
  G.answerLocked = true;
  const chosen = btn.getAttribute('data-val');
  const correct = document.getElementById('ansGrid').getAttribute('data-correct');
  const isOk = chosen === correct;
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

  if (isOk) {
    btn.classList.add('correct');
    G.score += 10; G.answers.push(true);
    beep('ok');
    const phrases = ['¡Excelente! 🎉','¡Muy bien! ✅','¡Perfecto! 🌟','¡Correcto! 🔥','¡Sí! 👏','¡Increíble! 💪'];
    document.getElementById('fb').innerHTML = `<div class="feedback-box ok">${phrases[Math.floor(Math.random()*phrases.length)]}</div>`;
  } else {
    btn.classList.add('wrong');
    btn.classList.add('shake-it');
    G.hearts--; G.answers.push(false);
    beep('bad');
    // highlight correct
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (b.getAttribute('data-val') === correct) b.classList.add('correct');
    });
    document.getElementById('fb').innerHTML = `<div class="feedback-box bad">Correct answer: <strong>${enc(correct)}</strong></div>`;
  }

  const delay = isOk ? 1100 : 1700;
  setTimeout(() => {
    G.qIdx++;
    if (G.qIdx >= G.questions.length || G.hearts <= 0) showComplete();
    else showQ();
  }, delay);
}

function quitConfirm() {
  if (confirm('Quit this level? Your progress won\'t be saved.')) showMap();
}

// ---------- LEVEL COMPLETE ----------
function showComplete() {
  const lv = G.level;
  const total = G.questions.length;
  const correct = G.answers.filter(Boolean).length;
  const pct = Math.round(correct / total * 100);
  const stars = pct>=90?3 : pct>=70?2 : pct>=50?1 : 0;
  const passed = stars > 0;

  // save progress
  if (passed && G.activePlayer) {
    const p = prog(G.activePlayer.id);
    const prev = p.scores[lv.id];
    const bonus = pct===100 ? 50 : 0;
    const newPts = stars*100 + bonus;
    if (!prev || stars > prev.stars) {
      const oldPts = prev ? prev.stars*100 : 0;
      p.points = (p.points||0) + newPts - oldPts;
      p.scores[lv.id] = { stars, score: pct };
      save();
    }
    if (stars === 3 || !prev || stars > prev.stars) {
      beep('win'); setTimeout(confetti, 350);
    } else { beep('ok'); }
  } else { beep('bad'); }

  const next = LEVELS.find(l=>l.id===lv.id+1);

  go(`
    <div class="bounce-in" style="padding-bottom:24px;">
      <div style="text-align:center;padding:28px 0 14px;">
        <div class="text-xs text-gray uppercase" style="margin-bottom:8px;">${passed?'Level Complete! 🎊':'Keep Practicing!'}</div>
        <div style="font-size:4rem">${passed?(stars===3?'🏆':stars===2?'🎯':'🌟'):'💪'}</div>
        <div class="big-stars">
          ${[1,2,3].map(s=>`<span class="star-slot" id="s${s}">⭐</span>`).join('')}
        </div>
        <div style="font-size:2.2rem;font-weight:900;">${pct}%</div>
        <div class="text-gray text-sm">${correct} of ${total} correct</div>
        ${passed ? `
          <div style="background:#dcfce7;border-radius:12px;padding:9px 16px;margin:14px auto;font-size:.9rem;color:#15803d;font-weight:700;display:inline-block;">
            +${stars*100}${pct===100?' + 50 bonus':''} points! 🎉
          </div>
        ` : `
          <div style="background:#fee2e2;border-radius:12px;padding:9px 16px;margin:14px auto;font-size:.9rem;color:#dc2626;font-weight:700;display:inline-block;">
            Need 50% to pass — you've got this!
          </div>
        `}
      </div>

      <div class="tip-card">
        <div class="tip-label">🇲🇽 Mission Trip Phrase</div>
        <div class="tip-es">"${enc(lv.tip.es)}"</div>
        <div class="tip-en">${enc(lv.tip.en)}</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;">
        ${passed && next ? `<button class="btn btn-primary btn-full btn-lg" onclick="startIntro(${next.id})">➡️ Next: ${enc(next.title)}</button>` : ''}
        ${passed && !next ? `<button class="btn btn-full btn-lg" style="background:#7c3aed;color:white;box-shadow:0 4px 0 #5b21b6;" onclick="showHome()">🇲🇽 ¡Felicidades! Course Complete!</button>` : ''}
        <button class="btn btn-outline btn-full" onclick="startLevel(${lv.id})">🔄 ${passed?'Play Again for More Stars':'Try Again'}</button>
        <button class="btn btn-ghost btn-full" onclick="showMap()">🗺️ Back to Level Map</button>
      </div>
    </div>
  `);

  // animate stars with delay
  [1,2,3].forEach(s => {
    setTimeout(() => {
      const el = document.getElementById(`s${s}`);
      if (el) {
        if (s <= stars) el.classList.add('lit');
        else { el.style.filter = 'grayscale(1) opacity(0.25)'; }
      }
    }, s * 350);
  });
}

// ============================================================
// INIT
// ============================================================

load();
showHome();
</script>

<script>
// ============================================================
// SERVICE WORKER — inline registration
// Injects the SW as a blob URL so it works from any origin,
// including GitHub Pages, without a separate sw.js file.
// ============================================================
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'vamos-mexico-v1';
const OFFLINE_URL = self.location.href;

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE).then(cache => cache.add(OFFLINE_URL))
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  event.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener('fetch', event => {
  if (event.request.mode === 'navigate') {
    event.respondWith(
      fetch(event.request).catch(() => caches.match(OFFLINE_URL))
    );
  } else {
    event.respondWith(
      caches.match(event.request).then(r => r || fetch(event.request))
    );
  }
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .catch(() => {
      // Blob-URL SW registration is blocked on some browsers (e.g. Firefox).
      // Silently fail — the game still works, just without offline caching.
    });
}
</script>
