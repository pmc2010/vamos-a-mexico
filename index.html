<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Vamos a México! 🇲🇽 Family Spanish</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #dc2626; --green: #16a34a; --green-dark: #15803d;
  --yellow: #fbbf24; --blue: #2563eb; --purple: #7c3aed;
  --orange: #ea580c; --teal: #0f766e;
  --bg: #fef9f0; --card: #ffffff; --text: #1e293b;
  --gray: #64748b; --border: #e2e8f0;
  --radius: 16px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.12);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 620px; margin: 0 auto; padding: 16px; min-height: 100vh; }
h1 { font-size: 2rem; font-weight: 900; }
h2 { font-size: 1.3rem; font-weight: 800; }
h3 { font-size: 1rem; font-weight: 700; }
.text-sm { font-size: 0.85rem; }
.text-xs { font-size: 0.75rem; }
.text-gray { color: var(--gray); }
.text-center { text-align: center; }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.uppercase { text-transform: uppercase; letter-spacing: 1px; }
.card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 14px; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 12px; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; text-decoration: none; user-select: none; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.96); }
.btn-full { width: 100%; }
.btn-lg { padding: 16px 24px; font-size: 1.05rem; }
.btn-sm { padding: 7px 14px; font-size: 0.85rem; }
.btn-primary { background: var(--green); color: white; box-shadow: 0 4px 0 var(--green-dark); }
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:active { box-shadow: none; transform: translateY(4px) scale(1); }
.btn-red { background: var(--red); color: white; box-shadow: 0 4px 0 #991b1b; }
.btn-red:active { box-shadow: none; transform: translateY(4px) scale(1); }
.btn-outline { background: transparent; color: var(--green); border: 2.5px solid var(--green); }
.btn-outline:hover { background: #f0fdf4; }
.btn-ghost { background: transparent; color: var(--gray); border: 2px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-blue { background: var(--blue); color: white; box-shadow: 0 4px 0 #1d4ed8; }
.btn-blue:active { box-shadow: none; transform: translateY(4px) scale(1); }
.btn-purple { background: var(--purple); color: white; box-shadow: 0 4px 0 #5b21b6; }
.btn-purple:active { box-shadow: none; transform: translateY(4px) scale(1); }
.input-field { width: 100%; padding: 12px 16px; border: 2.5px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.15s; background: white; color: var(--text); }
.input-field:focus { border-color: var(--green); }
.input-field.error { border-color: var(--red); }
.game-header { text-align: center; padding: 16px 0 8px; }
.game-title { font-size: 2.2rem; font-weight: 900; color: var(--red); text-shadow: 3px 3px 0 #fbbf2488; }
.flag-strip { display: flex; height: 6px; border-radius: 100px; overflow: hidden; margin: 8px 0; }
.flag-strip > div { flex: 1; }
.back-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 8px 10px; border-radius: 10px; transition: background 0.15s; color: var(--text); }
.back-btn:hover { background: var(--border); }
.avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; }
.avatar-opt { aspect-ratio: 1; font-size: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 3px solid transparent; cursor: pointer; transition: all 0.15s; background: #f1f5f9; }
.avatar-opt:hover { transform: scale(1.1); background: #e2e8f0; }
.avatar-opt.sel { border-color: var(--green); background: #dcfce7; transform: scale(1.05); }
.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
.color-dot { width: 38px; height: 38px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s; }
.color-dot:hover { transform: scale(1.2); }
.color-dot.sel { border-color: #1a1a2e; box-shadow: 0 0 0 2px white inset; }
.player-chips { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.player-chip { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 100px; border: 3px solid transparent; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.15s; }
.player-chip:hover { transform: scale(1.04); }
.player-chip.sel { border-width: 3px; }
.lb-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 12px; margin-bottom: 7px; }
.lb-item.r1 { background: #fef9c3; }
.lb-item.r2 { background: #f1f5f9; }
.lb-item.r3 { background: #fff7ed; }
.lb-item.r4 { background: #f8fafc; }
.rank-badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; }
.group-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.group-tabs::-webkit-scrollbar { display: none; }
.group-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 100px; font-size: 0.82rem; font-weight: 700; border: 2.5px solid var(--border); background: white; cursor: pointer; transition: all 0.15s; color: var(--gray); white-space: nowrap; }
.group-tab.active { color: white; border-color: transparent; }
.group-tab.locked-tab { opacity: 0.5; cursor: default; }
.level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.level-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.18s; border: 3px solid transparent; position: relative; overflow: hidden; }
.level-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.level-card.done { border-color: var(--green); }
.level-card.grammar-card { border-left: 5px solid var(--blue); }
.level-card.grammar-card.done { border-color: var(--blue); }
.level-num { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.level-emoji { font-size: 2rem; margin: 4px 0; }
.level-title { font-size: 0.95rem; font-weight: 800; }
.level-sub { font-size: 0.78rem; color: var(--gray); }
.level-badge { position: absolute; top: 8px; right: 8px; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 100px; }
.badge-done { background: #dcfce7; color: #15803d; }
.badge-grammar { background: #dbeafe; color: #1d4ed8; }
.group-locked-banner { background: #f8fafc; border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 14px; }
.lesson-card { background: linear-gradient(135deg, #1d4ed8, #7c3aed); color: white; border-radius: var(--radius); padding: 22px; margin: 14px 0; }
.lesson-rule { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 14px; margin: 10px 0; }
.lesson-example { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 8px; margin: 6px 0; font-size: 0.9rem; }
.lesson-es { font-weight: 700; }
.lesson-en { opacity: 0.8; font-style: italic; }
.lesson-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.88rem; }
.lesson-table th { background: rgba(255,255,255,0.2); padding: 7px 10px; text-align: left; font-weight: 700; }
.lesson-table td { padding: 7px 10px; border-top: 1px solid rgba(255,255,255,0.1); }
.lesson-table tr:hover td { background: rgba(255,255,255,0.08); }
.vocab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
.vocab-item { background: #f8fafc; border-radius: 8px; padding: 8px 11px; }
.vocab-es { font-weight: 700; font-size: 0.9rem; }
.vocab-en { font-size: 0.78rem; color: var(--gray); }
.progress-wrap { background: var(--border); border-radius: 100px; height: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #4ade80); border-radius: 100px; transition: width 0.4s ease; }
.hearts { display: flex; gap: 3px; font-size: 1.2rem; }
.q-card { background: white; border-radius: 20px; padding: 28px 22px; box-shadow: var(--shadow-lg); text-align: center; margin: 14px 0; }
.q-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 10px; }
.q-text { font-size: 2rem; font-weight: 900; color: var(--text); line-height: 1.2; }
.ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ans-btn { background: #f8fafc; border: 3px solid var(--border); border-radius: 12px; padding: 14px 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.3; color: var(--text); }
.ans-btn:hover:not(:disabled) { background: #dbeafe; border-color: #93c5fd; transform: scale(1.02); }
.ans-btn.correct { background: #dcfce7 !important; border-color: var(--green) !important; color: var(--green-dark) !important; }
.ans-btn.wrong { background: #fee2e2 !important; border-color: var(--red) !important; color: #991b1b !important; }
.feedback-box { text-align: center; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; animation: fadeUp 0.25s ease; }
.feedback-box.ok { background: #dcfce7; color: #15803d; }
.feedback-box.bad { background: #fee2e2; color: #dc2626; }
.passage-block { background: #f0fdf4; border-left: 5px solid var(--green); border-radius: 0 12px 12px 0; padding: 16px 18px; font-size: 1.05rem; font-weight: 600; line-height: 1.65; color: var(--text); margin: 10px 0 4px; text-align: left; }
.passage-block .speaker { color: var(--green-dark); font-weight: 800; }
.fill-sentence { font-size: 1.2rem; font-weight: 700; line-height: 1.6; color: var(--text); text-align: center; padding: 10px 4px 4px; }
.blank-slot { display: inline-block; background: #fef9c3; border-bottom: 3px solid var(--yellow); border-radius: 4px; padding: 2px 12px; color: #92400e; font-style: italic; min-width: 60px; text-align: center; }
.ans-btn.tall { padding: 12px 14px; font-size: 0.9rem; line-height: 1.35; text-align: left; }
.big-stars { display: flex; justify-content: center; gap: 8px; font-size: 3.2rem; margin: 14px 0; }
.star-slot { transition: all 0.4s; filter: grayscale(1) opacity(0.3); }
.star-slot.lit { filter: none; animation: starPop 0.5s cubic-bezier(.36,.07,.19,.97) forwards; }
.tip-card { background: linear-gradient(135deg, #16a34a, #0f766e); color: white; border-radius: var(--radius); padding: 20px; margin: 14px 0; text-align: center; }
.tip-label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
.tip-es { font-size: 1.45rem; font-weight: 900; margin: 7px 0 4px; }
.tip-en { font-size: 0.88rem; opacity: 0.85; }
#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
.cp { position: absolute; border-radius: 3px; animation: fall linear forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounceIn { 0% { transform: scale(0.85); opacity: 0; } 55% { transform: scale(1.04); } 100% { transform: scale(1); opacity: 1; } }
@keyframes starPop { 0% { transform: scale(0) rotate(-20deg); } 55% { transform: scale(1.35) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-9px); } 60% { transform: translateX(9px); } }
@keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
.bounce-in { animation: bounceIn 0.35s cubic-bezier(.36,.07,.19,.97); }
.shake-it { animation: shake 0.4s ease; }
@media (max-width: 420px) {
  .level-grid { grid-template-columns: 1fr; }
  .ans-grid { grid-template-columns: 1fr; }
  .q-text { font-size: 1.6rem; }
  .game-title { font-size: 1.8rem; }
}

.dict-tabs { display:flex; gap:6px; margin-bottom:14px; }
.dict-tab { flex:1; padding:9px 6px; border-radius:10px; font-size:0.8rem; font-weight:700; border:2px solid var(--border); background:white; cursor:pointer; transition:all 0.15s; color:var(--gray); text-align:center; }
.dict-tab.active { background:var(--green); color:white; border-color:var(--green); }
.dict-search { width:100%; padding:11px 16px; border:2.5px solid var(--border); border-radius:12px; font-size:1rem; outline:none; margin-bottom:12px; }
.dict-search:focus { border-color:var(--green); }
.dict-entry { display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-radius:12px; margin-bottom:6px; background:white; box-shadow:var(--shadow); cursor:pointer; transition:all 0.15s; }
.dict-entry:hover { transform:translateX(3px); }
.dict-es { font-weight:800; font-size:1rem; }
.dict-en { font-size:0.85rem; color:var(--gray); }
.dict-tag { font-size:0.65rem; font-weight:700; padding:2px 7px; border-radius:100px; flex-shrink:0; margin-top:2px; }
.dict-section { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gray); padding:10px 4px 4px; }
.explain-box { background:#fffbeb; border:2px solid #fbbf24; border-radius:10px; padding:10px 13px; font-size:0.85rem; margin-top:8px; animation:fadeUp 0.25s ease; }
.explain-box .explain-why { color:#92400e; font-weight:600; }
.explain-box .explain-correct { color:#15803d; font-weight:700; }

/* ── PRINT STYLES ── */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: white !important; font-family: Georgia, serif; font-size: 11pt; color: #000; }
  #app, #confetti { display: none !important; }
  #print-sheet { display: block !important; }

  .print-header { text-align: center; border-bottom: 3px solid #ce1126; padding-bottom: 10px; margin-bottom: 16px; }
  .print-title { font-size: 22pt; font-weight: 900; color: #ce1126; letter-spacing: 1px; }
  .print-subtitle { font-size: 10pt; color: #555; margin-top: 3px; }
  .print-flag { display: flex; height: 5px; margin: 6px auto; width: 200px; }
  .print-flag div { flex: 1; }

  .print-section-title { font-size: 10pt; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #555; border-bottom: 1px solid #ddd; padding: 4px 0 2px; margin: 12px 0 6px; page-break-after: avoid; }

  .print-cols { column-count: 2; column-gap: 24px; }
  .print-entry { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; border-bottom: 1px dotted #e0e0e0; page-break-inside: avoid; break-inside: avoid; }
  .print-es { font-weight: 700; font-size: 10.5pt; min-width: 130px; }
  .print-en { font-size: 9.5pt; color: #333; }
  .print-type { font-size: 7.5pt; color: #888; border: 1px solid #ccc; border-radius: 3px; padding: 1px 4px; white-space: nowrap; margin-left: auto; flex-shrink: 0; }

  .print-footer { text-align: center; font-size: 8pt; color: #888; border-top: 1px solid #ddd; padding-top: 8px; margin-top: 16px; }
  @page { margin: 0.65in 0.6in; }
}
@media screen { #print-sheet { display: none !important; } }
</style>
</head>
<body>
<div id="print-sheet">
  <!-- Populated by JS when user clicks Print -->
</div>
<div id="app"></div>
<div id="confetti"></div>
<script>
'use strict';

// ============================================================
// CONFIG
// ============================================================
const GROUPS = [
  { id:'vocab',        label:'📚 Vocabulary',    color:'#16a34a', unlockAfter:null,         unlockCount:0 },
  { id:'sentences',   label:'✍️ Sentences',      color:'#2563eb', unlockAfter:'vocab',      unlockCount:3 },

];

const AVATARS = ['😊','🤠','👧','👦','👩','👨','🧒','🦁','🐯','🌟','🦅','🙏','⛪','🎸','🌮'];
const COLORS  = ['#dc2626','#ea580c','#d97706','#16a34a','#0891b2','#2563eb','#7c3aed','#db2777'];

// ============================================================
// LEVELS
// ============================================================
const LEVELS = [

  { id:21, group:'sentences', emoji:'🔤', title:'Frases Simples', subtitle:'Simple Sentences',

    tip:{es:'Poco a poco se llega lejos.',en:'Step by step you go far.'},
    questions:[

      {type:'passage',label:'What does this say?',prompt:'La familia está muy feliz hoy.',correct:'The family is very happy today.',choices:['The family is very happy today.','The family is eating today.','The family is very tired today.','The family is going home today.']},
      {type:'passage',label:'What does this say?',prompt:'Necesito agua, por favor.',correct:'I need water, please.',choices:['I need water, please.','I want food, please.','I need help, please.','I have water, please.']},

      {type:'passage',label:'What is happening?',prompt:'Hay veinte niños esperando el corte de pelo.',correct:'There are twenty children waiting for haircuts.',choices:['There are twenty children waiting for haircuts.','There are twelve boys waiting for food.','Twenty kids are playing outside.','There are twenty children in the church.']},

  { id:25, group:'sentences', emoji:'🗣️', title:'Diálogos I', subtitle:'Short Conversations',
    desc:"Read short two-line conversations and figure out what\'s going on!",
    tip:{es:'— ¡Bienvenidos! — ¡Gracias, qué amables!',en:'"Welcome!" "Thank you, how kind!"'},
    questions:[
      {type:'passage',label:'What is happening?',prompt:'— ¡Hola! ¿Cómo te llamas?\n— Me llamo María. ¿Y tú?',correct:"They exchange names — the second person\'s name is María.",choices:["They exchange names — the second person\'s name is María.",'Two people greet each other and say goodbye.','Someone asks how María is feeling.','María asks where the person is from.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿Tienes hambre?\n— Sí, tengo mucha hambre. ¿Hay comida?',correct:'Someone asks if a person is hungry; they say yes and ask about food.',choices:['Someone asks if a person is hungry; they say yes and ask about food.','Two people agree they do not want to eat.','Someone offers food and the other says no.','A child says they are not hungry but want water.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿Cuántos años tienes?\n— Tengo ocho años.',correct:'Someone asks how old a person is and they say eight.',choices:['Someone asks how old a person is and they say eight.','Someone asks for a name and the answer is eight.','Two people are counting to eight together.','Someone asks if the child is eight and they say no.']},
      {type:'passage',label:'What is happening?',prompt:'— Perdón, ¿dónde está el baño?\n— Está allá, a la derecha.',correct:'Someone asks where the bathroom is and gets directions.',choices:['Someone asks where the bathroom is and gets directions.','Someone is looking for the school.','Two people are looking for the right street.','Someone asks about the park and gets directions.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿Hablas inglés?\n— Un poco. Más despacio, por favor.',correct:'Someone asks if the other speaks English; they say a little and ask to slow down.',choices:['Someone asks if the other speaks English; they say a little and ask to slow down.','Two people are speaking English together quickly.','Someone says they speak Spanish, not English.','Someone asks for English lessons.']},
      {type:'passage',label:'What is happening?',prompt:'— ¡Buenos días! ¿Cómo estás?\n— ¡Muy bien, gracias a Dios! ¿Y tú?',correct:'A morning greeting where both people exchange how they are doing.',choices:['A morning greeting where both people exchange how they are doing.','Someone says good night and asks about dinner.','Two people say goodbye and thank God.','Someone says they are not well and need help.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿Quieres un corte de pelo?\n— ¡Sí, por favor! Quiero el pelo corto.',correct:'Someone offers a haircut and the other wants it short.',choices:['Someone offers a haircut and the other wants it short.','Someone asks about hair color and wants it red.','The barber says the hair is too short already.','Someone wants long hair and asks for a haircut.']},
      {type:'passage',label:'What is happening?',prompt:'— La bicicleta está rota. ¿Puedes ayudarme?\n— ¡Claro que sí! Vamos a arreglarla.',correct:'Someone says their bike is broken; the other agrees to fix it.',choices:['Someone says their bike is broken; the other agrees to fix it.','Two people are looking for a new bicycle.','Someone offers to give away a broken bicycle.','Two people agree the wheel is fine.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿Puedo orar por ti?\n— Sí, por favor. Gracias, amigo.',correct:'Someone offers to pray for another person and they gratefully say yes.',choices:['Someone offers to pray for another person and they gratefully say yes.','Two friends are praying together in church.','Someone asks to read the Bible and the other agrees.','A person thanks their friend for praying yesterday.']},
      {type:'passage',label:'What is happening?',prompt:'— ¿De dónde eres?\n— Soy de los Estados Unidos. Estamos aquí para servir.',correct:"Someone asks where the other is from; they say the USA and that they\'re here to serve.",choices:["Someone asks where the other is from; they say the USA and that they\'re here to serve.",'Someone from Mexico asks about the United States.','Two Americans talk about where to serve next.','Someone says they are from Mexico and want to help.']},
    ]},

      {type:'passage',label:'What does this mean?',prompt:'La paz de Dios sobrepasa todo entendimiento.',correct:"God\'s peace surpasses all understanding.",choices:["God\'s peace surpasses all understanding.",'God\'s peace is the greatest gift of all.','The people of God live in peace forever.','God\'s peace is given to those who pray.']},
      {type:'passage',label:'What does this mean?',prompt:'Ama a tu prójimo como a ti mismo.',correct:'Love your neighbor as yourself.',choices:['Love your neighbor as yourself.','Love God with all your heart and soul.','Love your family more than anything.','Your neighbor should love you as a friend.']},
      {type:'passage',label:'What does this mean?',prompt:'El Señor es mi pastor; nada me faltará.',correct:'The Lord is my shepherd; I shall not want.',choices:['The Lord is my shepherd; I shall not want.','The Lord is my strength; I will not be afraid.','The Lord watches over me every day.','The Lord is good; his love never ends.']},
      {type:'passage',label:'What does this mean?',prompt:'Porque de tal manera amó Dios al mundo, que dio a su Hijo unigénito.',correct:'For God so loved the world that he gave his one and only Son.',choices:['For God so loved the world that he gave his one and only Son.','Because God loved his people, he sent them blessings.','God loved the world and created it with his own hands.','God gave the world to his children as a gift.']},
      {type:'passage',label:'What does this mean?',prompt:'Cantad al Señor un cántico nuevo.',correct:'Sing to the Lord a new song.',choices:['Sing to the Lord a new song.','Pray to the Lord every morning and night.','Come to the Lord with singing and joy.','Worship the Lord with music and praise.']},
      {type:'passage',label:'What does this mean?',prompt:'Todo lo puedo en Cristo que me fortalece.',correct:'I can do all things through Christ who strengthens me.',choices:['I can do all things through Christ who strengthens me.','All things are possible for those who believe in Christ.','Christ gives strength to those who pray every day.','Through faith in Christ, nothing can defeat me.']},
      {type:'passage',label:'What does this mean?',prompt:'Den gracias al Señor porque él es bueno; su amor dura para siempre.',correct:'Give thanks to the Lord, for he is good; his love endures forever.',choices:['Give thanks to the Lord, for he is good; his love endures forever.','Thank God for his blessings because he loves you.','Praise the Lord because his goodness never ends.','Be grateful to God because he is faithful always.']},

  { id:28, group:'sentences', emoji:'📝', title:'Historias', subtitle:'Story Paragraphs',
    desc:"Read longer stories in Spanish and understand what\'s happening!",
    tip:{es:'Una historia a la vez.',en:'One story at a time.'},
    questions:[
      {type:'passage',label:'What is this story about?',prompt:'Hoy llegamos al orfanato. Hay muchos niños felices esperándonos. Los niños quieren jugar y los adultos quieren ayudar. ¡Es un día especial!',correct:'A group arrives at the orphanage where happy children are waiting to play and be helped.',choices:['A group arrives at the orphanage where happy children are waiting to play and be helped.','A family visits a school and the teachers are waiting for them.','Children at an orphanage are hungry and waiting for food to arrive.','A team arrives at a church ready to sing and worship together.']},
      {type:'passage',label:'What is this story about?',prompt:'María tiene ocho años. No tiene mamá ni papá. Pero hoy está muy feliz porque hay una casa saltarina y ella quiere saltar mucho.',correct:'An 8-year-old orphan girl is very happy today because there is a bounce house.',choices:['An 8-year-old orphan girl is very happy today because there is a bounce house.','A little girl named María wants to find her parents at the park.','María is eight and is happy because she got a new bicycle.','An eight-year-old is sad because she cannot find the bounce house.']},
      {type:'passage',label:'What is this story about?',prompt:'El señor Carlos tiene una bicicleta rota. No tiene dinero para comprar una nueva. Hoy, el equipo misionero la arregló. Carlos llora de alegría y dice: "¡Gracias a Dios!"',correct:"A man\'s broken bike was fixed by the mission team and he cries with joy.",choices:["A man\'s broken bike was fixed by the mission team and he cries with joy.",'Carlos buys a new bicycle and thanks the team.','A man loses his bicycle and the team helps him find it.','Carlos cries because his bicycle cannot be fixed.']},
      {type:'passage',label:'What is this story about?',prompt:'En el servicio de adoración, todos cantamos juntos. Los niños no conocen las palabras, pero levantan sus manos. La presencia de Dios está aquí.',correct:'At the worship service, everyone sings and children raise their hands even without knowing the words.',choices:['At the worship service, everyone sings and children raise their hands even without knowing the words.','The children are learning Spanish worship songs in the church.','A worship team teaches the children new Bible verses.','Everyone prays together and the children lead worship.']},
      {type:'passage',label:'What is this story about?',prompt:'Ana llegó al orfanato con miedo. No hablaba español. Pero los niños la abrazaron y ella aprendió una palabra: "amiga."',correct:'Ana was afraid but the children hugged her and she learned the word "amiga" (friend).',choices:['Ana was afraid but the children hugged her and she learned the word "amiga" (friend).','Ana spoke no Spanish but taught the children English words.','A girl named Ana cried at the orphanage because she missed her friends.','Ana was nervous but learned Spanish quickly by talking to the teachers.']},
      {type:'passage',label:'What is this story about?',prompt:'La mamá llegó con sus cuatro hijos. Todos tenían hambre. El equipo les dio pan, agua y leche. La mamá miró al cielo y dijo: "Dios es bueno."',correct:'A mother with four hungry children received bread, water and milk from the team, and praised God.',choices:['A mother with four hungry children received bread, water and milk from the team, and praised God.','A team of four gave food to a group of mothers.','A mother brought food for the whole team.','Four children arrived hungry and the team helped them find their mother.']},
      {type:'passage',label:'What is this story about?',prompt:'El niño se llamaba Diego. Tenía el pelo muy largo. Después del corte de pelo, Diego se miró en el espejo y sonrió. "¡Estoy listo!" dijo.',correct:'A boy named Diego got a haircut, looked in the mirror, smiled and said he was ready.',choices:['A boy named Diego got a haircut, looked in the mirror, smiled and said he was ready.','Diego looked in the mirror and was upset about his new haircut.','A boy named Diego asked for a mirror to see his long hair.','Diego got new clothes and looked in the mirror feeling ready.']},
      {type:'passage',label:'What is this story about?',prompt:'Después del culto, un hombre se acercó a nosotros. Estaba llorando. Dijo: "Nadie me había dicho que Dios me amaba." Le oramos y el hombre sonrió.',correct:'After the service, a crying man said no one had told him God loved him; after prayer he smiled.',choices:['After the service, a crying man said no one had told him God loved him; after prayer he smiled.','A man came to the service and prayed for the mission team.','After church, a man cried because he was going to miss everyone.','A man smiled after the service and told us he already knew God loved him.']},
      {type:'passage',label:'What is this story about?',prompt:'El último día fue muy difícil. Los niños lloraban. Nosotros también. Una niña me abrazó fuerte y dijo: "¿Vas a volver?"',correct:'On the last day, children and team cried together, and a girl asked if they would come back.',choices:['On the last day, children and team cried together, and a girl asked if they would come back.','The last day was hard because the team got lost.','On the final day, the children performed a concert.','The last morning was emotional because food ran out.']},
      {type:'passage',label:'What is this story about?',prompt:'Esta semana, arreglamos bicicletas, cortamos pelo y compartimos comida. Pero lo más importante fue compartir el amor de Dios.',correct:"The week included fixing bikes, cutting hair, and sharing food, but most importantly sharing God\'s love.",choices:["The week included fixing bikes, cutting hair, and sharing food, but most importantly sharing God\'s love.",'The team spent the week building bikes and cooking food.','The most important thing was cutting hair and sharing supplies.','The week was about repairs and food, and the children learned a lot.']},
    ]},
  { id:29, group:'sentences', emoji:'🗣️', title:'Diálogos II', subtitle:'Real Conversations',
    desc:'Longer back-and-forth conversations — read carefully!',
    tip:{es:'Escucha más de lo que hablas.',en:'Listen more than you speak.'},
    questions:[
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Cómo te llamas?\n— Me llamo Carlos. ¿Y tú?\n— Me llamo Sarah. Soy de los Estados Unidos.\n— ¡Qué bien! Bienvenida a México.',correct:"Carlos and Sarah introduce themselves; she\'s from the USA and he welcomes her to Mexico.",choices:["Carlos and Sarah introduce themselves; she\'s from the USA and he welcomes her to Mexico.",'Two friends from Mexico meet and talk about the United States.','Sarah asks Carlos about Mexico and he tells her about his city.','Carlos and Sarah meet at church and share Bible verses.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Tienes hambre?\n— Sí, mucha. ¿Hay comida?\n— Sí, tenemos pan, agua y leche.\n— ¡Gracias! Dios los bendiga.',correct:'Someone is very hungry, gets offered bread, water and milk, and responds with a blessing.',choices:['Someone is very hungry, gets offered bread, water and milk, and responds with a blessing.','Two people order food at a restaurant and pray before eating.','A family asks for more food and offers to pay for it.','Someone offers food to a team and they say they already ate.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— Tu bicicleta está rota. ¿Puedo ayudarte?\n— Sí, por favor. No tengo dinero para una nueva.\n— No hay problema. La arreglamos gratis.\n— ¡Que Dios los bendiga!',correct:"A person\'s bike is broken; the team fixes it free and the person blesses them.",choices:["A person\'s bike is broken; the team fixes it free and the person blesses them.",'Someone buys a new bike and thanks the mission team for the money.','A broken bike is too expensive so the team gives the person a new one.','The team asks for money to fix a bicycle but the person cannot pay.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Cuántos años tienes?\n— Tengo diez años.\n— ¿Tienes hermanos?\n— Sí, tengo tres hermanas y un hermano.',correct:'An adult asks a child their age and about siblings; the child has four siblings total.',choices:['An adult asks a child their age and about siblings; the child has four siblings total.','A child asks an adult how old they are and about their family.','Two children ask each other their names and talk about school.','A child says they are ten and all their siblings are older.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Quieres un corte de pelo?\n— Sí, por favor. El pelo está muy largo.\n— ¿Lo quieres corto o un poco largo?\n— Corto, por favor. ¡Listo!',correct:"Someone asks about a haircut; the person wants it short and it\'s done.",choices:["Someone asks about a haircut; the person wants it short and it\'s done.",'A barber says the hair is fine and does not need a cut.','Two people are deciding on a hair color.','Someone wants long hair but the barber cuts it short by mistake.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— Hola. No hablo mucho español.\n— No hay problema. Hablo un poco de inglés.\n— ¡Perfecto! Podemos trabajar juntos.\n— ¡Sí! Somos amigos.',correct:'Two people with a language barrier realize they can work together and become friends.',choices:['Two people with a language barrier realize they can work together and become friends.','Two strangers argue about which language to use.','An English speaker teaches a Spanish class.','Two friends argue about English vs Spanish.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Puedo orar por ti?\n— Sí. Mi familia necesita ayuda.\n— Padre Dios, bendice a esta familia. Dales paz y provisión.\n— Amén. Gracias, amigo.',correct:"Someone offers to pray for a family in need, prays a blessing, and is thanked.",choices:["Someone offers to pray for a family in need, prays a blessing, and is thanked.",'A pastor leads a church service and prays for all families.','Two people pray together every morning.','Someone asks for prayer and the other says they will pray at home.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— El niño no quiere comer.\n— ¿Tiene hambre?\n— Sí, pero está nervioso.\n— Voy a sentarme con él. Así no está solo.',correct:"A child won\'t eat because he\'s nervous; someone decides to sit with him so he\'s not alone.",choices:["A child won\'t eat because he\'s nervous; someone decides to sit with him so he\'s not alone.",'A boy is not hungry and wants to play instead of eating.','A nervous child asks someone to sit with them and share food.','A child refuses food and the team prays for him.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Vas a volver el año que viene?\n— Espero que sí. Este lugar está en mi corazón.\n— Los niños te van a extrañar.\n— Y yo a ellos.',correct:'Someone hopes to return next year; this place is in their heart and they will miss the children.',choices:['Someone hopes to return next year; this place is in their heart and they will miss the children.','A person says they will never return to Mexico.','Two volunteers discuss which orphanage to visit next year.','Someone plans to stay permanently and will not go back home.']},
      {type:'passage',label:'What is this conversation about?',prompt:'— ¿Qué aprendiste este viaje?\n— Aprendí que el amor no necesita idioma.\n— ¿Qué quieres decir?\n— Que un abrazo dice más que mil palabras.',correct:'Someone reflects that love needs no language, and a hug says more than a thousand words.',choices:['Someone reflects that love needs no language, and a hug says more than a thousand words.','A person says they learned a lot of new Spanish words on the trip.','Two people talk about how important it is to speak the same language.','Someone says the trip was hard but they learned to work without speaking.']},
    ]},
  { id:30, group:'sentences', emoji:'🏅', title:'¡El Gran Final!', subtitle:'Sentences Champion',
    desc:"The hardest sentences level — mixed passages and fill-in-the-blank. You\'ve got this!",
    tip:{es:'Bien hecho. Ahora ve y sirve.',en:'Well done. Now go and serve.'},
    questions:[
      {type:'fill',label:'Which word completes the sentence?',prompt:'El amor ___ necesita idioma.',correct:'no',choices:['no','sí','más','poco']},
      {type:'passage',label:'What is the main message?',prompt:'Vinimos a México con herramientas, tijeras y comida. Pero lo que más dimos fue tiempo, amor y oración. Los niños no necesitaban cosas. Necesitaban saber que alguien los amaba.',correct:'The most important thing they gave was time, love, and prayer — not things.',choices:['The most important thing they gave was time, love, and prayer — not things.','The team brought the wrong supplies and had to improvise.','Children in Mexico mostly need food, tools, and haircuts.','Prayer was less important than the physical supplies.']},
      {type:'fill',label:'Which word completes the sentence?',prompt:'Un ___ dice más que mil palabras.',correct:'abrazo',choices:['abrazo','corte','arreglo','verso']},
      {type:'passage',label:'What is this person realizing?',prompt:'Fui a México para ayudar a otros. Pero al final, creo que ellos me ayudaron a mí. Me enseñaron a ser feliz con poco, a reír sin razón y a amar sin condiciones.',correct:'The person went to help but realized the people there taught them joy, laughter, and unconditional love.',choices:['The person went to help but realized the people there taught them joy, laughter, and unconditional love.','The person helped the community and received money and food in return.','Someone went to Mexico and learned they needed to study more Spanish.','The person realized that Mexico needs more mission teams each year.']},
      {type:'fill',label:'Which word completes the sentence?',prompt:'Aprendí que el amor no ___ idioma.',correct:'necesita',choices:['necesita','habla','tiene','conoce']},
      {type:'passage',label:'What is happening?',prompt:'Juan tenía miedo de hablar con los niños. No sabía español. Pero él empezó a reír con ellos, a jugar fútbol y a compartir su comida. Al final del día, era el favorito de todos.',correct:"Juan was afraid to speak but connected through laughter, soccer, and sharing — and became everyone\'s favorite.",choices:["Juan was afraid to speak but connected through laughter, soccer, and sharing — and became everyone\'s favorite.",'Juan spoke Spanish well and taught the children English words.','Juan was shy but the pastor translated everything he said.','A boy named Juan refused to play with the team.']},
      {type:'fill',label:'Which word completes the sentence?',prompt:'Vine a ___, pero aprendí a recibir.',correct:'dar',choices:['dar','tomar','correr','volver']},
      {type:'passage',label:'What is the lesson?',prompt:'Al final del viaje, no recordamos las bicicletas que arreglamos ni el pelo que cortamos. Recordamos los nombres de los niños, sus sonrisas y sus abrazos.',correct:"What you remember at the end are the children\'s names, smiles, and hugs — not the tasks.",choices:["What you remember at the end are the children\'s names, smiles, and hugs — not the tasks.",'The team was proud of how many bicycles they fixed.','The best memories were the worship services and Bible lessons.','People remember most the food they shared and the work they accomplished.']},
      {type:'fill',label:'Which phrase completes this blessing?',prompt:'Que Dios les ___ en el camino de vuelta a casa.',correct:'guíe',choices:['guíe','llame','cante','arregle']},
      {type:'passage',label:'What is the final message?',prompt:'Dios es bueno. ¡Todo el tiempo! Y todo el tiempo... ¡Dios es bueno! Este es el mensaje que llevamos al mundo — en español, en inglés, con palabras o sin ellas.',correct:"God is good all the time — this is the message we carry to the world, in any language, with or without words.",choices:["God is good all the time — this is the message we carry to the world, in any language, with or without words.",'God is good and we must learn Spanish to share his message correctly.','The best way to share God\'s love is through music and Bible verses.','God\'s message is only truly understood when spoken in the local language.']},
    ]},

  // ── GRAMMAR (31–50) ────────────────────────────────────────
  { id:31, group:'grammar', isLesson:true, emoji:'⚡', title:'El / La', subtitle:'Noun Gender',
    desc:'Every Spanish noun is masculine or feminine. This changes the article used before it.',
    tip:{es:'El niño y la niña juegan juntos.',en:'The boy and the girl play together.'},
    lesson:{
      title:'El / La — Noun Gender',
      intro:'In Spanish, every noun is either masculine or feminine. This affects which word you use for "the" and "a/an."',
      rules:[
        {rule:'"El" = the (masculine) | "La" = the (feminine)',examples:[{es:'el niño',en:'the boy'},{es:'la niña',en:'the girl'},{es:'el agua',en:'the water'},{es:'la casa',en:'the house'}]},
        {rule:'"Un" = a/an (masculine) | "Una" = a/an (feminine)',examples:[{es:'un perro',en:'a dog'},{es:'una silla',en:'a chair'},{es:'un libro',en:'a book'},{es:'una bicicleta',en:'a bicycle'}]},
        {rule:'Most nouns ending in -o are masculine. Most ending in -a are feminine.',examples:[{es:'el pelo (hair)',en:'masculine — ends in -o'},{es:'la iglesia (church)',en:'feminine — ends in -a'},{es:'el baño (bathroom)',en:'masculine — ends in -o'},{es:'la familia (family)',en:'feminine — ends in -a'}]},
      ],
      table:{headers:['Word','Gender','Article'],rows:[['niño (boy)','Masculine','el / un'],['niña (girl)','Feminine','la / una'],['pelo (hair)','Masculine','el / un'],['familia (family)','Feminine','la / una'],['amor (love)','Masculine','el / un'],['iglesia (church)','Feminine','la / una']]},
    },
    questions:[
      {type:'fill',label:'Choose the correct article.',prompt:'___ niño está feliz.',correct:'El',explain:'"Niño" (boy) is masculine → use EL',choices:['El','La','Un','Una']},
      {type:'fill',label:'Choose the correct article.',prompt:'___ bicicleta está rota.',correct:'La',explain:'"Bicicleta" ends in -a → feminine → use LA',choices:['La','El','Un','Una']},
      {type:'fill',label:'Choose the correct article.',prompt:'___ agua está fría.',correct:'El',explain:'"Agua" is feminine but takes EL for sound (special rule)',choices:['El','La','Un','Una']},
      {type:'fill',label:'Choose the correct article.',prompt:'___ iglesia es bonita.',correct:'La',explain:'"Iglesia" ends in -a → feminine → use LA',choices:['La','El','Un','Una']},
      {type:'fill',label:'Choose the correct article.',prompt:'Quiero ___ silla, por favor.',correct:'una',explain:'"Silla" is feminine → indefinite article is UNA',choices:['una','un','la','el']},
      {type:'fill',label:'Choose the correct article.',prompt:'Hay ___ perro en la calle.',correct:'un',explain:'"Perro" ends in -o → masculine → use UN',choices:['un','una','el','la']},
      {type:'passage',label:'Which sentence uses articles correctly?',prompt:'Choose the correctly written sentence:',correct:'El niño tiene una bicicleta.',choices:['El niño tiene una bicicleta.','La niño tiene un bicicleta.','El niña tiene una bicicleta.','Un niño tiene el bicicleta.']},
      {type:'passage',label:'Which sentence uses articles correctly?',prompt:'Choose the correctly written sentence:',correct:'La familia tiene una casa.',choices:['La familia tiene una casa.','El familia tiene un casa.','La familia tiene un casa.','El familia tiene una casa.']},
      {type:'fill',label:'Choose the correct article.',prompt:'___ amor de Dios es grande.',correct:'El',explain:'"Amor" is masculine → use EL',choices:['El','La','Un','Una']},
      {type:'fill',label:'Choose the correct article.',prompt:'Necesito ___ llave para arreglar esto.',correct:'una',explain:'"Llave" is feminine → indefinite article is UNA',choices:['una','un','la','el']},
    ]},
  { id:32, group:'grammar', isLesson:true, emoji:'👥', title:'Plural Forms', subtitle:'Singular to Plural',
    desc:'Learn how to talk about more than one person or thing.',
    tip:{es:'Los niños están jugando.',en:'The children are playing.'},
    lesson:{
      title:'Plural Forms — More Than One',
      intro:'Making nouns plural in Spanish is simple! You usually just add -s or -es. The articles change too.',
      rules:[
        {rule:'Add -s if noun ends in a vowel',examples:[{es:'niño → niños',en:'boy → boys'},{es:'niña → niñas',en:'girl → girls'},{es:'casa → casas',en:'house → houses'},{es:'bicicleta → bicicletas',en:'bicycle → bicycles'}]},
        {rule:'Add -es if noun ends in a consonant',examples:[{es:'árbol → árboles',en:'tree → trees'},{es:'color → colores',en:'color → colors'},{es:'camión → camiones',en:'truck → trucks'},{es:'nación → naciones',en:'nation → nations'}]},
        {rule:'Articles also change: el→los, la→las, un→unos, una→unas',examples:[{es:'el niño → los niños',en:'the boy → the boys'},{es:'la niña → las niñas',en:'the girl → the girls'},{es:'una casa → unas casas',en:'a house → some houses'},{es:'un amigo → unos amigos',en:'a friend → some friends'}]},
      ],
      table:{headers:['Singular','Plural','Translation'],rows:[['el niño','los niños','the boys'],['la niña','las niñas','the girls'],['el amigo','los amigos','the friends'],['la bicicleta','las bicicletas','the bicycles'],['el color','los colores','the colors']]},
    },
    questions:[
      {type:'fill',label:'Make this plural.',prompt:'el niño → ___ niños',correct:'los',explain:'EL (masculine singular) → LOS (masculine plural)',choices:['los','las','unos','unas']},
      {type:'fill',label:'Make this plural.',prompt:'la bicicleta → ___ bicicletas',correct:'las',explain:'LA (feminine singular) → LAS (feminine plural)',choices:['las','los','unas','unos']},
      {type:'fill',label:'Choose the correct plural.',prompt:'Hay muchos ___ en la calle.',correct:'niños',choices:['niños','niño','niñas','niña']},
      {type:'passage',label:'Which sentence is correctly plural?',prompt:'We want to say "The boys want to play."',correct:'Los niños quieren jugar.',choices:['Los niños quieren jugar.','El niños quiere jugar.','Las niños quieren jugar.','Los niño quieren jugar.']},
      {type:'fill',label:'Make this plural.',prompt:'un amigo → ___ amigos',correct:'unos',explain:'UN (masculine singular) → UNOS (masculine plural)',choices:['unos','unas','los','las']},
      {type:'fill',label:'Choose the correct form.',prompt:'___ casas están aquí.',correct:'Las',choices:['Las','Los','Una','Un']},
      {type:'fill',label:'Make this plural.',prompt:'la familia → ___ familias',correct:'las',explain:'LA (feminine singular) → LAS (feminine plural)',choices:['las','los','unas','unos']},
      {type:'passage',label:'Which sentence is correctly plural?',prompt:'We want to say "The bicycles are broken."',correct:'Las bicicletas están rotas.',choices:['Las bicicletas están rotas.','Los bicicletas están roto.','La bicicleta están rotas.','Las bicicletas está rota.']},
      {type:'fill',label:'Choose the correct plural.',prompt:'Los ___ están felices.',correct:'niños',choices:['niños','niño','niñas','familia']},
      {type:'passage',label:'Which sentence is correctly plural?',prompt:'We want to say "The friends are here."',correct:'Los amigos están aquí.',choices:['Los amigos están aquí.','El amigos está aquí.','Los amigo están aquí.','Las amigos están aquí.']},
    ]},
  { id:33, group:'grammar', isLesson:true, emoji:'🔄', title:'Ser vs. Estar', subtitle:'"To Be" — Two Ways',
    desc:'Spanish has two verbs for "to be" — SER and ESTAR. Knowing which to use is key!',
    tip:{es:'Soy de Arizona. Estoy en México.',en:'I am from Arizona. I am in Mexico.'},
    lesson:{
      title:'Ser vs. Estar — Two Ways to Say "To Be"',
      intro:'English has one verb "to be." Spanish has two: SER and ESTAR. SER is for permanent identity; ESTAR is for temporary states and location.',
      rules:[

  { id:61, group:'mastery', emoji:'🔀', title:'Mezcla I', subtitle:'Mixed Review 1',

    questions:[
      {type:'fill',label:'Choose the correct article.',prompt:'___ amor de Dios es infinito.',correct:'El',choices:['El','La','Un','Una']},
      {type:'passage',label:'What does this sentence mean?',prompt:'Quiero ayudarte con todo mi corazón.',correct:'I want to help you with all my heart.',choices:['I want to help you with all my heart.','I want to love you with all my soul.','I need help with my whole family.','I want to pray for you every day.']},
      {type:'fill',label:'SER or ESTAR?',prompt:'Dios ___ bueno todo el tiempo.',correct:'es',choices:['es','está','son','están']},
      {type:'fill',label:'Conjugate correctly.',prompt:'Nosotros ___ a servir mañana. (IR + A)',correct:'vamos',choices:['vamos','van','voy','vas']},
      {type:'passage',label:'What is happening?',prompt:'Los niños corrían y saltaban mientras los adultos arreglaban las bicicletas.',correct:'Children were running and jumping while adults fixed bikes.',choices:['Children were running and jumping while adults fixed bikes.','The children fixed bikes while the adults ran and jumped.','Everyone was running and jumping near the bicycles.','The children were crying while adults sang together.']},

      {type:'fill',label:'Conjugate TENER.',prompt:'Yo ___ mucho amor para dar.',correct:'tengo',choices:['tengo','tienes','tiene','tienen']},
      {type:'passage',label:'What does this verse mean?',prompt:'Todo lo puedo en Cristo que me fortalece.',correct:'I can do all things through Christ who strengthens me.',choices:['I can do all things through Christ who strengthens me.','Everything I do, I do for Christ who is strong.','Christ makes me strong in everything I do.','All things are possible when I strengthen Christ.']},

  { id:62, group:'mastery', emoji:'🔀', title:'Mezcla II', subtitle:'Mixed Review 2',
    desc:'Grammar and conversation skills combined — show your full range!',
    tip:{es:'Cada día es una nueva oportunidad.',en:'Every day is a new opportunity.'},
    questions:[
      {type:'fill',label:'Preterite tense.',prompt:'Ayer yo ___ con los niños. (jugar)',correct:'jugué',choices:['jugué','jugaba','juego','jugaré']},
      {type:'fill',label:'Future tense.',prompt:'Ella ___ a cantar en la iglesia. (IR + A)',correct:'va',choices:['va','voy','vas','vamos']},
      {type:'passage',label:'What does this story say?',prompt:'La primera vez que vi a los niños del orfanato, lloré. No porque estaban tristes, sino porque eran tan felices con tan poco.',correct:'The narrator cried seeing the children — not because they were sad but because they were so happy with so little.',choices:['The narrator cried seeing the children — not because they were sad but because they were so happy with so little.','The children cried when they first saw the mission team.','The narrator was sad because the children had very little food.','The first day was difficult because the children would not play.']},
      {type:'fill',label:'Reflexive pronoun.',prompt:'___ siento muy bendecido hoy.',correct:'Me',choices:['Me','Te','Se','Nos']},
      {type:'fill',label:'Imperfect tense.',prompt:'Cuando era joven, yo ___ a la iglesia cada domingo. (ir)',correct:'iba',choices:['iba','fui','voy','iré']},
      {type:'passage',label:'Which sentence is grammatically correct?',prompt:'We want to say "The children are going to sing a new song."',correct:'Los niños van a cantar una canción nueva.',choices:['Los niños van a cantar una canción nueva.','Los niños va a cantar una canción nuevo.','Los niños vamos a cantar una canción nueva.','Los niños van cantar una canción nueva.']},
      {type:'fill',label:'Choose the right question word.',prompt:'___ años tiene ese niño?',correct:'¿Cuántos',choices:['¿Cuántos','¿Cuándo','¿Cómo','¿Por qué']},
      {type:'passage',label:'What is the main idea?',prompt:'No vine a México a enseñar. Vine a aprender. Los niños me enseñaron más sobre la fe y el gozo que cualquier libro.',correct:'The narrator came to learn, not teach — the children taught them more about faith and joy than any book.',choices:['The narrator came to learn, not teach — the children taught them more about faith and joy than any book.','The narrator taught the children how to read and they were very grateful.','Books about Mexico taught the narrator everything about faith.','The narrator came to teach but left early because it was too hard.']},
      {type:'fill',label:'Direct object pronoun.',prompt:'La bicicleta estaba rota. ___ arreglamos ayer.',correct:'La',choices:['La','Lo','Las','Los']},
      {type:'fill',label:'Por or Para?',prompt:'Este viaje es ___ glorificar a Dios.',correct:'para',choices:['para','por','de','en']},
    ]},
  { id:63, group:'mastery', emoji:'📜', title:'Textos Largos', subtitle:'Long Text Comprehension',
    desc:'Read longer Spanish passages and demonstrate deep understanding.',
    tip:{es:'La comprensión es el fruto de la atención.',en:'Comprehension is the fruit of attention.'},
    questions:[
      {type:'passage',label:'What is the main theme?',prompt:'México me cambió para siempre. No porque la comida era diferente, ni porque el idioma era nuevo. Sino porque vi a personas que tenían todo lo necesario — amor, fe y comunidad — sin tener casi nada material.',correct:'The writer was transformed by seeing people rich in love, faith, and community despite having little material wealth.',choices:['The writer was transformed by seeing people rich in love, faith, and community despite having little material wealth.','The writer loved the food in Mexico so much that it changed their life.','Learning Spanish changed the writer\'s perspective on everything.','The writer returned home because they missed their own community.']},
      {type:'passage',label:"What is Diego\'s situation?",prompt:'Diego tiene doce años y vive en el orfanato desde los tres. No recuerda a su mamá ni a su papá. Pero hay algo en sus ojos — una luz, una esperanza — que te hace creer que Dios todavía está escribiendo su historia.',correct:"Diego has lived in the orphanage since age 3, doesn\'t remember his parents, but has hopeful light in his eyes.",choices:["Diego has lived in the orphanage since age 3, doesn\'t remember his parents, but has hopeful light in his eyes.",'Diego is twelve and recently arrived at the orphanage after losing his mother.','Diego is hopeful because he knows his parents are coming back soon.','Diego is twelve and teaches the younger children in the orphanage.']},
      {type:'passage',label:'What happened at the worship service?',prompt:'Durante el culto, un hombre que nunca había escuchado el evangelio se paró al frente. Estaba llorando. Dijo que toda su vida había sentido un vacío, y que por primera vez en sus cincuenta años, ese vacío estaba lleno.',correct:'A man who had never heard the gospel came forward crying, saying the emptiness in his life was filled for the first time.',choices:['A man who had never heard the gospel came forward crying, saying the emptiness in his life was filled for the first time.','A man who attended church his whole life recommitted his faith.','A fifty-year-old man stood up to lead the worship team.','A man cried because he was happy the mission team arrived.']},
      {type:'passage',label:"What is Ana learning?",prompt:'Ana pensaba que el idioma sería la barrera más grande. Pero después de una semana, se dio cuenta de que el amor habla su propio idioma — uno que todos entienden, sin importar si es en inglés o en español.',correct:'Ana discovered that love speaks its own universal language understood by all.',choices:['Ana discovered that love speaks its own universal language understood by all.','Ana studied so hard that by the end of the week she spoke Spanish fluently.','Ana found out that language barriers are impossible to overcome.','Ana decided to return to Mexico to study Spanish full time.']},
      {type:'passage',label:'What does this paragraph describe?',prompt:'El orfanato no es un lugar triste. Es un lugar lleno de risa, de juego y de esperanza. Sí, hay dolor. Pero también hay una comunidad que se cuida, que ora junta y que celebra cada momento pequeño.',correct:'The orphanage is full of laughter, play, and hope — a caring community that prays and celebrates small moments.',choices:['The orphanage is full of laughter, play, and hope — a caring community that prays and celebrates small moments.','The orphanage is a difficult place where children struggle to find happiness.','The orphanage recently received new toys that made the children happy.','The community near the orphanage prays for the children from a distance.']},
      {type:'passage',label:'What is the lesson of this reflection?',prompt:'Creía que iba a llegar a México a dar. Y di — tiempo, esfuerzo, amor. Pero al final del viaje, me di cuenta de que había recibido mucho más de lo que di. Así funciona la gracia de Dios.',correct:"The writer went to give but received far more — that\'s how God\'s grace works.",choices:["The writer went to give but received far more — that\'s how God\'s grace works.",'The writer gave money and received the same amount in return.','God\'s grace means we always receive more when we give to others.','The writer realized they should have given more time and stayed longer.']},
      {type:'passage',label:'What challenge does this describe?',prompt:'El primer día fue caótico. Nadie sabía español perfectamente. Las herramientas estaban en el camión. Los niños llegaron antes de que estuviéramos listos. Pero de alguna manera, funcionó.',correct:'The first day was chaotic — imperfect Spanish, tools in the truck, children arriving early — yet somehow it worked out.',choices:['The first day was chaotic — imperfect Spanish, tools in the truck, children arriving early — yet somehow it worked out.','The first day went perfectly because the team had prepared everything.','The chaos on the first day caused the team to almost give up.','The children helped the team organize their tools on the first day.']},
      {type:'passage',label:'What is the significance of the haircut?',prompt:'Para muchos de los niños, el corte de pelo era más que una corte de pelo. Era atención. Era que alguien les miraba, les tocaba con cuidado, y les decía: "Eres importante."',correct:'The haircut meant more than a haircut — it was attention, care, and someone telling children they are important.',choices:['The haircut meant more than a haircut — it was attention, care, and someone telling children they are important.','The children were excited about haircuts because they wanted to look good for pictures.','The haircut station was important because many children had head lice.','The children were afraid of haircuts but were eventually convinced.']},
      {type:'passage',label:"What is the writer\'s prayer?",prompt:'Señor, que nunca olvide sus caras. Que nunca olvide sus nombres. Y que cada vez que me sienta cómodo y seguro, me recuerdes que hay niños en el mundo que necesitan saber que Tú los amas.',correct:"The writer prays never to forget the children\'s faces and names, and to be reminded that children need to know God loves them.",choices:["The writer prays never to forget the children\'s faces and names, and to be reminded that children need to know God loves them.",'The writer prays to return to Mexico every year for the rest of their life.','The writer asks God to help them learn Spanish so they can communicate better.','The writer prays that the orphanage will close when all children have homes.']},
      {type:'passage',label:'What is the final message?',prompt:'Al final de todo, lo que llevamos de regresa a casa no cabe en una maleta. Se lleva en el corazón — en los recuerdos, en las oraciones, en los nombres que nunca olvidaremos.',correct:"What you take home doesn\'t fit in a suitcase — it\'s carried in the heart through memories, prayers, and unforgettable names.",choices:["What you take home doesn\'t fit in a suitcase — it\'s carried in the heart through memories, prayers, and unforgettable names.",'The writer brought home many gifts and souvenirs in their suitcase.','The most important thing to bring home is food and supplies.','The writer left all their belongings in Mexico and brought only prayers home.']},
    ]},

      {type:'fill',label:'SER or ESTAR?',prompt:'Estos niños ___ muy especiales para Dios.',correct:'son',choices:['son','están','somos','estamos'],explain:'Permanent characteristic → SER. Son = they are (always special)'},
      {type:'fill',label:'Choose the correct article.',prompt:'___ amor es el regalo más grande.',correct:'El',choices:['El','La','Un','Una'],explain:'Amor is masculine → EL amor'},
      {type:'passage',label:'Which sentence correctly uses the future?',prompt:'We want to say: "Tomorrow we are going to pray for all the families."',correct:'Mañana vamos a orar por todas las familias.',choices:['Mañana vamos a orar por todas las familias.','Mañana vamos orar por todas las familias.','Mañana van a orar por todas las familias.','Mañana voy a orar por todas las familias.'],explain:'NOSOTROS future: vamos a + infinitive'},
      {type:'fill',label:'POR or PARA?',prompt:'Trabajamos ___ dos días sin descanso.',correct:'por',choices:['por','para','de','en'],explain:'POR = duration of time (for two days)'},
      {type:'fill',label:'Choose the correct adjective form.',prompt:'Las niñas estaban muy ___ con la fiesta. (excited)',correct:'emocionadas',choices:['emocionadas','emocionado','emocionados','emocionada'],explain:'LAS NIÑAS = feminine plural → adjective must match: emocionadas'},
      {type:'fill',label:'Conjugate correctly.',prompt:'Cuando ___ pequeño, soñaba con viajar. (ser, imperfect)',correct:'era',choices:['era','fui','soy','seré'],explain:'Imperfect of SER for YO = ERA (ongoing past state)'},
      {type:'fill',label:'Choose the correct reflexive pronoun.',prompt:'Los niños ___ llaman Diego y Carlos.',correct:'se',choices:['se','me','te','nos'],explain:'ELLOS uses reflexive pronoun SE: Se llaman = their names are'},
      {type:'fill',label:'Direct object pronoun.',prompt:'¿Ves a esa niña? Sí, ___ veo. Está llorando.',correct:'la',choices:['la','lo','las','los'],explain:'Esa niña is feminine singular → object pronoun = LA'},
      {type:'passage',label:'Which sentence is grammatically correct?',prompt:'We want to say: "The children want to play with us."',correct:'Los niños quieren jugar con nosotros.',choices:['Los niños quieren jugar con nosotros.','Los niños quieren jugar con nos.','Los niños quiero jugar con nosotros.','Los niños quieren a jugar con nosotros.'],explain:'QUERER: ellos = quieren. After preposition use full pronoun: con nosotros'},
    ]},
  { id:72, group:'mastery', isLesson:true, emoji:'🔀', title:'Gramática Viva II', subtitle:'Grammar in Real Sentences',
    desc:'More grammar in mission trip context — challenging combinations.',
    tip:{es:'Cada error es una lección.',en:'Every mistake is a lesson.'},
    questions:[
      {type:'fill',label:'Choose the correct form.',prompt:'¡Mira! Ese niño ___ llorando ahora. (estar)',correct:'está',choices:['está','estuvo','estaba','estará'],explain:'ESTAR for current ongoing action → present: está llorando = is crying right now'},
      {type:'fill',label:'POR or PARA?',prompt:'Este viaje fue muy difícil ___ mí, pero valió la pena.',correct:'para',choices:['para','por','de','a'],explain:'PARA = perspective (difficult FOR me = from my point of view)'},
      {type:'passage',label:'Which sentence correctly says "She used to sing every Sunday"?',prompt:'Choose the correct sentence.',correct:'Ella cantaba cada domingo.',choices:['Ella cantaba cada domingo.','Ella cantó cada domingo.','Ella canta cada domingo.','Ella va a cantar cada domingo.'],explain:'Habitual past → IMPERFECT: cantaba = used to sing'},
      {type:'fill',label:'Conjugate QUERER correctly.',prompt:'¿Tú ___ aprender más español?',correct:'quieres',choices:['quieres','quiero','quiere','queremos'],explain:'QUERER stem-changes e→ie. TÚ = quieres'},
      {type:'fill',label:'Choose the correct plural.',prompt:'Hay muchas ___ esperando en la fila. (familia)',correct:'familias',choices:['familias','familia','familiares','familios'],explain:'Feminine -a nouns: add -s for plural. Familia → familias'},
      {type:'passage',label:'Which sentence correctly says "I fixed it" (referring to the bicycle)?',prompt:'Choose the correct sentence.',correct:'La arreglé.',choices:['La arreglé.','Lo arreglé.','Las arreglé.','Le arreglé.'],explain:'Bicicleta is feminine → object pronoun = LA. Arreglé = I fixed (preterite)'},
      {type:'fill',label:'Choose the correct form of SER.',prompt:'Nosotros ___ de los Estados Unidos.',correct:'somos',choices:['somos','estamos','son','están'],explain:'Origin is permanent → SER. NOSOTROS = SOMOS'},
      {type:'fill',label:'Choose the correct article.',prompt:'Voy a ___ iglesia esta tarde.',correct:'la',choices:['la','el','una','un'],explain:'Iglesia is feminine → LA iglesia'},
      {type:'fill',label:'Conjugate IR correctly.',prompt:'¿Adónde ___ ustedes después del culto?',correct:'van',choices:['van','vamos','voy','vas'],explain:'USTEDES uses the ELLOS form of IR = VAN'},
      {type:'passage',label:'Which sentence correctly says "God has always loved you"?',prompt:'Choose the correct sentence.',correct:'Dios siempre te ha amado.',choices:['Dios siempre te ha amado.','Dios siempre te ama.','Dios siempre te amaba.','Dios siempre te amó.'],explain:'Present perfect (ha amado) with siempre = has always loved — ongoing action to the present'},
    ]},
  { id:73, group:'mastery', emoji:'🔢', title:'Números en Contexto', subtitle:'Numbers in Real Life',

      {type:'passage',label:'You need 45 chairs. How do you say that?',prompt:'How do you say 45 in Spanish?',correct:'cuarenta y cinco',choices:['cuarenta y cinco','cuatro y cinco','cincuenta y cuatro','cuarenta y cuatro']},
      {type:'passage',label:'The line has 38 people. How do you say that?',prompt:'How do you say 38?',correct:'treinta y ocho',choices:['treinta y ocho','cuarenta y ocho','treinta y tres','veinte y ocho']},
      {type:'passage',label:'Someone asks "¿Cuántos años tienes?" You\'re 42.',prompt:'How do you say "I am 42 years old"?',correct:'Tengo cuarenta y dos años.',choices:['Tengo cuarenta y dos años.','Soy cuarenta y dos años.','Tengo cuatro dos años.','Estoy cuarenta y dos años.']},

      {type:'passage',label:'A child says "Tengo tres hermanos y dos hermanas." How many siblings total?',prompt:'How many siblings total?',correct:'5 siblings',choices:['5 siblings','3 siblings','2 siblings','6 siblings']},
      {type:'passage',label:'100 people are coming. How do you say that?',prompt:'How do you say "There are one hundred people"?',correct:'Hay cien personas.',choices:['Hay cien personas.','Hay ciento personas.','Hay mil personas.','Hay diez personas.']},
      {type:'passage',label:'The service starts at 6 PM.',prompt:'How do you say "The service starts at 6 in the evening"?',correct:'El culto empieza a las seis de la tarde.',choices:['El culto empieza a las seis de la tarde.','El culto empieza a seis de la tarde.','El culto empieza a las seis de la mañana.','El culto empieza las seis de la tarde.']},
      {type:'passage',label:'You\'re distributing 24 toys. How do you say 24?',prompt:'How do you say 24 in Spanish?',correct:'veinticuatro',choices:['veinticuatro','veinte y cuatro','veintitrés','veinticinco']},
